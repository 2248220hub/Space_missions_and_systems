    matlab: `%% Routh-Hurwitz Array Construction (General)
function stable = routh_hurwitz(coeffs)
    % Constructs Routh array and checks stability
    n = length(coeffs);
    rows = ceil(n/2);
    R = zeros(n, rows);
    
    % Fill first two rows
    R(1, :) = coeffs(1:2:end);
    if length(coeffs(2:2:end)) < rows
        R(2, 1:length(coeffs(2:2:end))) = coeffs(2:2:end);
    else
        R(2, :) = coeffs(2:2:end);
    end
    
    % Compute remaining rows
    for i = 3:n
        for j = 1:rows-1
            if R(i-1, 1) == 0
                R(i-1, 1) = 1e-10; % avoid division by zero
            end
            R(i, j) = -(R(i-2,1)*R(i-1,j+1) - R(i-2,j+1)*R(i-1,1)) / R(i-1,1);
        end
    end
    
    fprintf('Routh Array:\\n');
    for i = 1:n
        fprintf('  s^%d: ', n-i);
        fprintf('%.4f  ', R(i, R(i,:)~=0));
        fprintf('\\n');
    end
    
    first_col = R(:, 1);
    fprintf('\\nFirst column: ');
    fprintf('%.4f  ', first_col);
    fprintf('\\n');
    
    sign_changes = sum(diff(sign(first_col)) ~= 0);
    stable = all(first_col > 0);
    fprintf('Sign changes: %d\\n', sign_changes);
    fprintf('STABLE: %s\\n', mat2str(stable));
end

% Example: PID control
Iy = 500; kd = 30; kp = 2; ki = 0.005;

          </div>
        ) : null}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
