    derivation: `**ACS Tasks (Slide 2):**
An ACS must:

**Passive vs Active Control:**
  • Passive: gravity gradient, spin stabilization — simple, low accuracy

**ACS Components:**
  1. Sensors: star trackers, Earth sensors, Sun sensors, gyroscopes
  2. Software: determination + control algorithms
  3. Actuators: thrusters, magnetic torqrods, reaction wheels

**Control Law (General Form):**
  u(t) = KFF(t)·xd(t) + Kp(t)·e(t)

  where e(t) = xd(t) − x̂(t) is the state deviation.

    matlab: `%% ACS Block Diagram Simulation (1-axis, P-control)
% Demonstrates the control loop structure
Ix = 500;           % moment of inertia [kg·m²]
Kp_gain = -2.0;     % proportional gain [N·m/rad]
theta_d = 0;        % desired angle [rad]
dt = 0.5; T = 200;  % time step and duration [s]
t = 0:dt:T;
theta = zeros(size(t)); omega = zeros(size(t));
theta(1) = deg2rad(10); % initial error

for k = 1:length(t)-1
    e = theta_d - theta(k);        % error
    Tc = Kp_gain * e;              % P-control torque
    alpha = Tc / Ix;               % angular acceleration
    omega(k+1) = omega(k) + alpha*dt;
    theta(k+1) = theta(k) + omega(k+1)*dt;
end

figure; subplot(2,1,1);
plot(t, rad2deg(theta), 'b', 'LineWidth', 1.5);
xlabel('Time [s]'); ylabel('\\theta [deg]');
title('P-control: no damping → oscillates forever');

  {
    id: "pid_law", num: "2", title: "PID Control Law & State-Space Form", pages: "Slides 5–7", icon: "🎛️",
    overview: {
      why: "The PID controller is the most common control law in spacecraft ACS. Understanding the three terms (P, D, I) and when each is needed is essential — the professor explicitly asks 'prove PID is better than PD.'",
      objective: "Write the PID control law, explain each term's physical role, and write the LTI state-space equations ẋ = Ax + Bu, y = Cx + Du.",
      realMission: "Nearly all Earth-observation satellites use PID (or PD) control for nadir pointing. The integral term is critical for nulling steady-state error from solar radiation pressure."
    },
    equations: [
      { name: "PID Control Law", eq: "Tci = Kp·er + Kd·(d/dt)er + Ki·∫er dt,  i = 1,2,3", explain: "er = attitude error (desired − actual). Each axis has its own set of gains. Kp = proportional (spring), Kd = derivative (damper), Ki = integral (nulls constant bias)." },
      { name: "LTI State-Space Form", eq: "ẋ = Ax + Bu\ny = Cx + Du", explain: "A, B, C, D constant matrices. For SISO: B is column vector, D is scalar. C plays the role of H̃ in orbit determination." },
      { name: "Transfer Function", eq: "G(s) = Y(s)/U(s) = C(sI − A)⁻¹B + D", explain: "Derived from Laplace-transforming the state-space equations with zero IC." },
    ],
    derivation: `**From Block Diagram to PID (Slides 5-7):**

The general control law:
  u(t) = KFF(t)·xd(t) + Kp(t)·e(t)

For attitude control with second-order dynamics (Euler eqns), a PD 
control provides spring + damping. But with a CONSTANT disturbance D:

  PD: Iy·θ̈ + kd·θ̇ + kp·θ = D
  
  Steady state (θ̈ = θ̇ = 0): θ∞ = D/kp ≠ 0  ← RESIDUAL ERROR!

Adding the integral term:
  PID: Iy·θ̈ + kd·θ̇ + kp·θ + ki·∫θ dt = D
  
  Differentiate: Iy·θ⃛ + kd·θ̈ + kp·θ̇ + ki·θ = 0
  
  Steady state: ki·θ∞ = 0  ⟹  θ∞ = 0  ✓

**This is the key oral exam argument: PID nulls steady-state 
error, PD does not, under constant disturbance.**

**State-Space (MIMO):**
  sX(s) = AX(s) + BU(s)
  Y(s) = CX(s) + DU(s)
  
  ⟹ X(s) = (sI−A)⁻¹ BU(s)
  ⟹ Y(s) = [C(sI−A)⁻¹B + D] U(s) = G(s)U(s)
  
  G(s) is the transfer MATRIX for MIMO systems.`,
    matlab: `%% PD vs PID under constant disturbance
Iy = 800; D_torque = 0.05;  % [kg·m²], [N·m]
kp = 0.5; kd = 20; ki = 0.002;
dt = 0.1; T = 600; t = 0:dt:T;

% --- PD control ---
theta_pd = zeros(size(t)); w_pd = zeros(size(t));
for k = 1:length(t)-1
    Tc = -kd*w_pd(k) - kp*theta_pd(k);
    alpha = (D_torque + Tc)/Iy;
    w_pd(k+1) = w_pd(k) + alpha*dt;
    theta_pd(k+1) = theta_pd(k) + w_pd(k+1)*dt;
end

% --- PID control ---
theta_pid = zeros(size(t)); w_pid = zeros(size(t)); integ = 0;
for k = 1:length(t)-1
    integ = integ + theta_pid(k)*dt;
    Tc = -kd*w_pid(k) - kp*theta_pid(k) - ki*integ;
    alpha = (D_torque + Tc)/Iy;
    w_pid(k+1) = w_pid(k) + alpha*dt;
    theta_pid(k+1) = theta_pid(k) + w_pid(k+1)*dt;
end

figure;
plot(t, rad2deg(theta_pd), 'r', t, rad2deg(theta_pid), 'b', 'LineWidth', 1.5);
yline(rad2deg(D_torque/kp), '--r', '\\theta_{\\infty}^{PD}');
yline(0, '--b', '\\theta_{\\infty}^{PID}');
legend('PD','PID'); xlabel('Time [s]'); ylabel('\\theta [deg]');
title('PD vs PID under constant disturbance'); grid on;`,
    traps: [
      "⚠️ CLASSIC EXAM: 'Dimostrare che PID è meglio di PD.' The argument is: PD leaves θ∞ = D/kp; PID gives θ∞ = 0.",
      "⚠️ Don't forget: PID characteristic equation is 3rd order. Routh-Hurwitz gives stability conditions: kd > 0, ki > 0, kp > Iy·ki/kd.",
      "⚠️ A matrix in LTI is CONSTANT — unlike the variational equations in OD where Ã(t) is time-varying!"
    ],

      { q: "What is the physical role of the derivative gain Kd?", a: "Kd provides damping — it opposes angular velocity, preventing oscillations. Without it, the system oscillates forever." },
      { q: "What is the transfer function G(s) for a SISO system in state-space form?", a: "G(s) = C(sI − A)⁻¹B + D, derived by Laplace-transforming ẋ = Ax + Bu with zero initial conditions." },
    ]
  },

  /* ═══ MODULE 3 ═══ */
  {
    id: "ctrl_examples", num: "3", title: "Control Examples: PNG & Gyroscopic Control", pages: "Slides 8–14", icon: "🚀",
    overview: {
      why: "These two examples demonstrate how to formulate a control problem from physical equations. The interception/PNG example shows open-loop proportional navigation; the gyroscopic example shows how spinning spacecraft dynamics lead to coupled, complex eigenvalue problems.",

      { name: "Gyroscopic Euler Equations (Axisymmetric)", eq: "[ω̇x]   [0   −k] [ωx]   [1/Ix  0 ] [ux]\n[ω̇y] = [k    0] [ωy] + [0   1/Ix] [uy]\n\nk = n(Iz − Ix)/Ix", explain: "n = constant spin rate about z-axis. The off-diagonal coupling ±k is the gyroscopic effect." },
      { name: "PD stability for spinner", eq: "ω⊥²(t) = ω⊥²(0)·exp[2kp/(1−kd)·t]\nStability: kp < 0,  0 < kd < 1", explain: "kp < 0 ensures exponential decay of transverse angular velocity. kd < 1 keeps the denominator positive." },
    ],
    derivation: `**Example 1: Proportional Navigation Guidance (Slides 8-11)**

Target at RT(t), interceptor at R(t), relative distance r(t) = R − RT.
The PNG law steers V toward the projected intercept point:

  V(t)(T−t) = r(t) + VT(t)(T−t)

  ⟹ V(t) = r(t)/(T−t) + VT(t)

  Control acceleration:
  u = dV/dt = V̇T + ṙ/(T−t) + r/(T−t)²

This requires knowing target position and velocity (from sensors/observer).

**Example 2: Gyroscopic Control (Slides 12-14)**

Axisymmetric SC: Ix = Iy, spinning at ωz = n (constant).
Euler equations with PD control u = Ix·kp·ω + Ix·kd·ω̇:

  (1−kd)[ω̇x]   [kp  −k] [ωx]
          [ω̇y] = [k   kp] [ωy]

Multiply 1st by ωx, 2nd by ωy, sum:
  (1−kd)·d/dt(ω⊥²) = 2kp·ω⊥²

  ⟹ ω⊥²(t) = ω⊥²(0)·exp[2kp·t/(1−kd)]

Stability requires kp < 0 and (1−kd) > 0, i.e. kd < 1.`,
    matlab: `%% Gyroscopic PD Control for Axisymmetric Spinner
Ix = 100; Iz = 150; n = 0.5;  % [kg·m²], [rad/s]
k_gyro = n*(Iz - Ix)/Ix;
kp = -0.05; kd = 0.3;         % stability: kp<0, 0<kd<1

dt = 0.1; T = 300; t = 0:dt:T;
wx = zeros(size(t)); wy = zeros(size(t));
wx(1) = 0.1; wy(1) = 0.05;   % initial perturbation [rad/s]

A_eff = [kp, -k_gyro; k_gyro, kp] / (1-kd);
for ii = 1:length(t)-1
    w = [wx(ii); wy(ii)];
    wdot = A_eff * w;
    wx(ii+1) = wx(ii) + wdot(1)*dt;
    wy(ii+1) = wy(ii) + wdot(2)*dt;
end

figure; subplot(1,2,1);
plot(t, wx, 'b', t, wy, 'r', 'LineWidth', 1.5);
xlabel('Time [s]'); ylabel('\\omega [rad/s]');
legend('\\omega_x','\\omega_y'); title('Transverse \\omega decay');
grid on;

subplot(1,2,2);
plot(wx, wy, 'k', 'LineWidth', 1);
xlabel('\\omega_x'); ylabel('\\omega_y');
title('Phase portrait (spiral to origin)'); grid on; axis equal;`,
    traps: [
      "⚠️ The gyroscopic coupling k = n(Iz−Ix)/Ix changes sign depending on whether the SC is oblate (Iz > Ix) or prolate (Iz < Ix).",
      "⚠️ kd = 1 makes the denominator zero — singularity! Always state 0 < kd < 1 strictly.",
      "⚠️ PNG requires knowledge of target velocity — if you can't observe VT, the guidance law fails."
    ],
    drills: [
      { q: "In PNG, what happens if the gain matrix is too small?", a: "The interceptor converges too slowly and may exceed the maximum thrust duration before reaching the target." },
      { q: "For the axisymmetric spinner with PD control, what are the stability conditions?", a: "kp < 0 (negative proportional gain for decay) and 0 < kd < 1 (derivative gain strictly between 0 and 1)." },
      { q: "Why does the gyroscopic term couple the x and y equations?", a: "The spinning body has angular momentum along z; any perturbation in x induces precession in y (and vice versa) through the ω × H cross-product in Euler's equations." },
    ]
  },

  /* ═══ MODULE 4 ═══ */
  {
    id: "linearized_euler", num: "4", title: "Linearized Euler Equations & Gravity Gradient", pages: "Slides 15–19", icon: "📐",
    overview: {
      why: "The Euler equations are nonlinear — control theory needs LINEAR equations. This module derives the linearized attitude dynamics in the orbital frame, showing how gravity gradient provides a restoring torque (passive stabilization).",
      objective: "Derive the three linearized Euler equations for a triaxial satellite in circular orbit. Show that pitch is decoupled and roll-yaw are coupled.",
      realMission: "Space tethers (TSS, SEDS) rely purely on gravity gradient for stabilization — modeled as dumbbells with Ix = Iy = I, Iz = 0."
    },
    equations: [
      { name: "Euler's Equations (general)", eq: "T = Ḣ + ω × H\nTx = Ix·ω̇x + ωyωz(Iz − Iy)\nTy = Iy·ω̇y + ωxωz(Ix − Iz)\nTz = Iz·ω̇z + ωxωy(Iy − Ix)", explain: "H = Iω in body frame. The cross-product ω×H gives gyroscopic coupling." },
      { name: "Angular velocity decomposition", eq: "ωBI = ωBR + ωRIB\n[ωx]   [φ̇ − ψω₀]\n[ωy] = [θ̇ − ω₀  ]\n[ωz]   [ψ̇ + φω₀ ]", explain: "ωBR = (φ̇, θ̇, ψ̇). ωRIB obtained by rotating (0, −ω₀, 0) into BF via small-angle DCM." },
      { name: "Linearized Euler equations", eq: "Tdx = Ix·φ̈ + 4ω₀²(Iy−Iz)φ − ω₀(Ix+Iz−Iy)ψ̇\nTdy = Iy·θ̈ + 3ω₀²(Ix−Iz)θ\nTdz = Iz·ψ̈ + ω₀²(Iy−Ix)ψ + ω₀(Iz+Ix−Iy)φ̇", explain: "Pitch (θ) is DECOUPLED. Roll (φ) and yaw (ψ) are COUPLED through ω₀ terms." },
      { name: "Space tether (dumbbell)", eq: "φ̈ + 4ω₀²φ = 0\nθ̈ + 3ω₀²θ = 0", explain: "Ix = Iy = I, Iz = 0. Natural frequencies: 2ω₀ (roll), √3·ω₀ (pitch). Yaw is neutrally stable (Gz = 0)." },
    ],
    derivation: `**Step 1: Angular velocity decomposition (Slide 16)**

BF angular velocity wrt IF:
  ωBI = ωBR + ωRIB

For circular orbit, RF rotates at −ω₀ about y:
  ωRI|RF = (0, −ω₀, 0)ᵀ

Small-angle rotation BF←RF:
  R = [1, ψ, −θ; −ψ, 1, φ; θ, −φ, 1]

  ωRIB = R · (0, −ω₀, 0)ᵀ = (−ψω₀, −ω₀, φω₀)ᵀ

Therefore:
  ωx = φ̇ − ψω₀
  ωy = θ̇ − ω₀      ← the −ω₀ is because y-axis opposes h
  ωz = ψ̇ + φω₀

**Step 2: Gravity gradient torques (Slide 17)**

For small angles:
  Gx = 3ω₀²(Iz − Iy)φ
  Gy = 3ω₀²(Iz − Ix)θ
  Gz = 0

**Step 3: Substitute into Euler equations, linearize, collect terms.**

Key result: PITCH IS DECOUPLED, stable if Ix > Iz.
Roll-yaw coupled — stability requires more analysis (DeBra-Delp).`,
    matlab: `%% Space Tether Librations (Dumbbell Model)
I_perp = 1e4;   % Ix = Iy [kg·m²]
w0 = 0.001;     % orbital rate [rad/s]
dt = 1; T = 20000; t = 0:dt:T;

% Pitch: θ̈ + 3ω₀²θ = 0  →  ωpitch = √3·ω₀
% Roll:  φ̈ + 4ω₀²φ = 0  →  ωroll  = 2ω₀
theta = zeros(size(t)); phi = zeros(size(t));
dtheta = zeros(size(t)); dphi = zeros(size(t));
theta(1) = deg2rad(5); phi(1) = deg2rad(3);

for k = 1:length(t)-1
    ddtheta = -3*w0^2*theta(k);
    ddphi   = -4*w0^2*phi(k);
    dtheta(k+1) = dtheta(k) + ddtheta*dt;
    dphi(k+1)   = dphi(k)   + ddphi*dt;
    theta(k+1)  = theta(k) + dtheta(k+1)*dt;
    phi(k+1)    = phi(k) + dphi(k+1)*dt;
end

figure;
plot(t/60, rad2deg(theta), 'b', t/60, rad2deg(phi), 'r', 'LineWidth', 1.5);
xlabel('Time [min]'); ylabel('Angle [deg]');
legend('Pitch \\theta (\\omega = \\surd3 \\omega_0)',...
       'Roll \\phi (\\omega = 2\\omega_0)');

      { name: "LT of derivatives", eq: "L{f'(t)} = sF(s) − f(0)\nL{f''(t)} = s²F(s) − sf(0) − f'(0)", explain: "This is why LT converts ODEs to algebraic equations — derivatives become polynomials in s." },
      { name: "ODE solution via LT", eq: "aÿ + bẏ + cy = f(t)\nY(s) = F(s)/(as²+bs+c) + [asy₀+ay₁+by₀]/(as²+bs+c)", explain: "First term = forced response; second term = free response from initial conditions." },
      { name: "Transfer function (MIMO)", eq: "G(s) = C(sI − A)⁻¹B + D", explain: "Maps input U(s) to output Y(s). Poles of G(s) = eigenvalues of A." },
    ],
    derivation: `**Key LT Pairs (Slide 25):**

  δ(t)  ↔  1          (impulse)
  u(t)  ↔  1/s         (step)
  t·u(t) ↔ 1/s²       (ramp)
  eᵃᵗ   ↔  1/(s−a)    (exponential)
  sin(ωt) ↔ ω/(s²+ω²)
  cos(ωt) ↔ s/(s²+ω²)

**Key Properties:**
  Linearity:    af(t)+bg(t) ↔ aF(s)+bG(s)
  Shift:        e⁻ᵃᵗf(t) ↔ F(s+a)
  Scaling:      f(at) ↔ (1/a)F(s/a)
  Integration:  ∫₀ᵗ f(τ)dτ ↔ F(s)/s

**MIMO Transfer Matrix (Slide 21):**
  sX(s) = AX(s) + BU(s)   [with X(0) = 0]
  X(s) = (sI − A)⁻¹ B U(s)
  Y(s) = [C(sI−A)⁻¹B + D] U(s) = G(s) U(s)

**Final Value Theorem:** lim_{t→∞} f(t) = lim_{s→0} sF(s)
  (if the limit exists — useful for checking steady-state errors)`,
    matlab: `%% Laplace Transform: Solve 2nd-order ODE numerically
% Compare with exact LT solution for step input
m = 2; b = 0.8; k_spring = 1;
wn = sqrt(k_spring/m);
zeta = b/(2*m*wn);
fprintf('Natural freq: %.3f rad/s, Damping ratio: %.3f\\n', wn, zeta);

% Exact step response (from LT inverse)
t = 0:0.1:60;
wd = wn*sqrt(1-zeta^2);
y_exact = (1/(m*wn^2)) * (1 - exp(-wn*zeta*t) .* ...
    (cos(wd*t) + (zeta/sqrt(1-zeta^2))*sin(wd*t)));

% Numerical integration for comparison
y_num = zeros(size(t)); dy = zeros(size(t));
dt = t(2)-t(1);
for ii = 1:length(t)-1
    ddy = (1 - b*dy(ii) - k_spring*y_num(ii))/m;  % step input = 1
    dy(ii+1) = dy(ii) + ddy*dt;
    y_num(ii+1) = y_num(ii) + dy(ii+1)*dt;
end

figure;
plot(t, y_exact, 'b-', t, y_num, 'r--', 'LineWidth', 1.5);
legend('Exact (LT)','Numerical'); xlabel('Time [s]'); ylabel('y(t)');

      { name: "Impulse response (0 < ζ < 1)", eq: "y(t) = [1/(mωn√(1−ζ²))] · e^(−ωnζt) · sin(ωn√(1−ζ²)·t)", explain: "Damped oscillation at frequency ωd = ωn√(1−ζ²)." },
      { name: "Step response (0 < ζ < 1)", eq: "y(t) = 1/(mωn²) · [1 − e^(−ωnζt)(cos ωdt + (ζ/√(1−ζ²))sin ωdt)]", explain: "Asymptotic value = 1/(mωn²). Overshoot and settling time depend on ζ." },
      { name: "Settling time", eq: "ts ≈ 4/(ωnζ)", explain: "Time to reach within 2% of final value. Derived from e^(−ωnζt) ≈ 0.02." },
    ],
    derivation: `**Impulse Response (Slides 28-29):**

For δ input, U(s) = 1:
  Y(s) = 1/[m(s−s₁)(s−s₂)]

Partial fractions:
  Y(s) = (1/m) · 1/(s₁−s₂) · [1/(s−s₁) − 1/(s−s₂)]

For 0 < ζ < 1: s₁,₂ = −ωnζ ± iωd,  ωd = ωn√(1−ζ²)

  y(t) = e^(−ωnζt)/(mωd) · sin(ωdt)

**Step Response (Slide 30):**

For step input, U(s) = 1/s:
  y(t) = (1/mωn²)[1 − e^(−ωnζt)(cos ωdt + (ζ/√(1−ζ²))sin ωdt)]

**Key observations from the plot (Slide 30):**
  • ζ = 0: undamped oscillation (never settles)
  • 0 < ζ < 1: damped oscillation with overshoot
  • ζ = 1: fastest non-oscillatory (critically damped)
  • ζ > 1: overdamped (slow, no oscillation)

  Smaller ζ → faster rise but larger overshoot.
  Design trade-off: ζ ≈ 0.7 is often optimal.

**Settling time (Slide 31):**
  For large t: y(t) ≈ (1/mωn²)[1 − e^(−ωnζt)]
  e^(−ωnζts) = 0.02  ⟹  ts = −ln(0.02)/(ωnζ) ≈ 4/(ωnζ)`,
    matlab: `%% 2nd-Order Step Response for Various Damping Ratios
wn = 1;  % normalized natural frequency
t = 0:0.05:30;
zeta_vals = [0.1, 0.3, 0.5, 0.7, 1.0, 1.5];
colors = {'r','m','b','g','k','c'};

figure; hold on;
for i = 1:length(zeta_vals)
    z = zeta_vals(i);
    if z < 1
        wd = wn*sqrt(1-z^2);
        y = 1 - exp(-wn*z*t).*(cos(wd*t) + (z/sqrt(1-z^2))*sin(wd*t));
    elseif z == 1
        y = 1 - (1 + wn*t).*exp(-wn*t);
    else
        s1 = -wn*z + wn*sqrt(z^2-1);
        s2 = -wn*z - wn*sqrt(z^2-1);
        y = 1 + (s1*exp(s2*t) - s2*exp(s1*t))/(s2-s1);
    end
    plot(t, y, colors{i}, 'LineWidth', 1.5);
end
yline(1, '--', 'Steady state');
yline(0.98, ':', '2% band'); yline(1.02, ':');
legend(arrayfun(@(z) sprintf('\\zeta = %.1f', z), zeta_vals, 'Uni', 0));
xlabel('\\omega_n t'); ylabel('y(t)/y_{\\infty}');
title('Step Response vs Damping Ratio'); grid on;

% Settling times
fprintf('\\nSettling times (2%% criterion):\\n');
for z = [0.3 0.5 0.7 1.0]
    fprintf('  zeta = %.1f: ts ≈ %.1f / wn\\n', z, 4/(wn*z));
end`,

      { name: "Impulsive rotation (bang-bang)", eq: "Iz·ψ̈ = m₀[δ(t) − δ(t−tf)]\nψf = (m₀/Iz)·tf", explain: "Two impulses: one to start rotation, one to stop. m₀ has dimensions of [torque×time]." },
      { name: "Finite-pulse rotation", eq: "tf = (Iz·ψf)/(M₀τ) + τ\nM₀ = m₀/τ = constant thrust level", explain: "Longer than impulsive case by τ (pulse duration). Trapezoidal angular velocity profile." },
    ],
    derivation: `**Bang-Bang with Impulsive Thrusters (Slide 36):**

  Iz·ψ̈ = m₀[δ(t) − δ(t−tf)]

Integrate once:
  ψ̇(t) = {m₀/Iz  for 0 < t < tf
           {0      for t > tf

Integrate twice:
  ψ(t) = {(m₀/Iz)·t     for 0 < t < tf
          {(m₀/Iz)·tf    for t > tf

So: ψf = (m₀/Iz)·tf  ⟹  tf = (Iz·ψf)/m₀

Minimum turn time ⟹ maximum impulse m₀.

**Finite-Pulse Rotation (Slides 38-41):**

Replace δ(t) with rectangular pulse of duration τ and height M₀ = m₀/τ:

  ψ̇(t) = {(M₀/Iz)·t           0 < t ≤ τ
           {(M₀/Iz)·τ           τ < t ≤ tf−τ    (coast phase)
           {(M₀/Iz)·(tf−t)      tf−τ < t ≤ tf

Angular velocity profile is trapezoidal. The rotation angle:
  ψf = (M₀/Iz)·τ·(tf − τ)

Turn time: tf = (Iz·ψf)/(M₀·τ) + τ  > impulsive case

This excites structural modes less than impulsive control.`,
    matlab: `%% Bang-Bang Rotation: Impulsive vs Finite Pulse
Iz = 200;           % [kg·m²]
psi_f = deg2rad(90); % desired rotation [rad]

% --- Impulsive case ---
m0 = 10;            % [N·m·s]
tf_imp = Iz*psi_f/m0;
t1 = 0:0.1:tf_imp*1.3;
psi_imp = zeros(size(t1)); w_imp = zeros(size(t1));
for k = 1:length(t1)
    if t1(k) <= tf_imp
        w_imp(k) = m0/Iz;
        psi_imp(k) = (m0/Iz)*t1(k);
    else
        w_imp(k) = 0;
        psi_imp(k) = (m0/Iz)*tf_imp;
    end
end

% --- Finite pulse case ---
tau = 5;            % pulse duration [s]
M0 = m0/tau;        % thrust level [N·m]
tf_fin = Iz*psi_f/(M0*tau) + tau;
t2 = 0:0.1:tf_fin*1.3;
psi_fin = zeros(size(t2)); w_fin = zeros(size(t2));
for k = 1:length(t2)
    tt = t2(k);
    if tt <= tau
        w_fin(k) = (M0/Iz)*tt;
        psi_fin(k) = (M0/(2*Iz))*tt^2;
    elseif tt <= tf_fin-tau
        w_fin(k) = (M0/Iz)*tau;
        psi_fin(k) = (M0/Iz)*tau*(tt - tau/2);
    elseif tt <= tf_fin
        w_fin(k) = (M0/Iz)*(tf_fin-tt);
        psi_fin(k) = (M0/Iz)*(tau*(tf_fin-tau) - 0.5*(tf_fin-tt)^2);
    else
        w_fin(k) = 0;
        psi_fin(k) = (M0/Iz)*tau*(tf_fin-tau);
    end
end

figure;
subplot(2,1,1);
plot(t1, w_imp, 'r', t2, w_fin, 'b', 'LineWidth', 1.5);
legend('Impulsive','Finite pulse'); ylabel('\\omega_z [rad/s]');
title('Angular Velocity Profile'); grid on;
subplot(2,1,2);
plot(t1, rad2deg(psi_imp), 'r', t2, rad2deg(psi_fin), 'b', 'LineWidth', 1.5);
xlabel('Time [s]'); ylabel('\\psi [deg]');
title('Rotation Angle'); grid on;
fprintf('Impulsive tf = %.1f s, Finite tf = %.1f s\\n', tf_imp, tf_fin);`,
    traps: [
      "⚠️ m₀ has dimensions [torque × time] = [N·m·s], NOT just torque. The delta function has dimensions 1/[time].",
      "⚠️ Bang-bang with impulses is time-OPTIMAL but excites structural modes. Finite pulses are gentler but slower.",
      "⚠️ The dead zone [e₁, e₂] in bang-bang control prevents chattering — but allows a residual pointing error within the dead band."
    ],
    drills: [
      { q: "Why do momentum exchange devices NOT change the total angular momentum?", a: "They only redistribute momentum between the wheel and the spacecraft body. The total system momentum (spacecraft + wheels) is conserved — Ḣs + ḣW = 0." },
      { q: "What is the turn time for an impulsive bang-bang rotation of 90° with Iz = 200 kg·m² and m₀ = 10 N·m·s?", a: "tf = Iz·ψf/m₀ = 200 × π/2 / 10 = 31.4 seconds." },
      { q: "Why is the finite-pulse turn time longer than the impulsive case?", a: "The finite pulse needs time τ to accelerate and decelerate. tf = Iz·ψf/(M₀τ) + τ, which exceeds the impulsive tf = Iz·ψf/m₀." },
    ]
  },

  /* ═══ MODULE 8 ═══ */
  {
    id: "pid_perturbation", num: "8", title: "PID Under Constant Perturbation & Routh-Hurwitz", pages: "Slides 42–48", icon: "🔧",
    overview: {
      why: "This is arguably the most exam-tested topic in the control section. The professor directly asks: 'Dimostrare che PID è meglio di PD.' You must derive the steady-state error for PD and show it vanishes for PID, then prove stability via Routh-Hurwitz.",
      objective: "Derive θ∞ = D/kp for PD, θ∞ = 0 for PID. State the Routh-Hurwitz stability conditions: kd > 0, ki > 0, kp > Iy·ki/kd.",
      realMission: "Solar radiation pressure on a planetary spacecraft (e.g., Cassini, BepiColombo) is nearly constant in the body frame when attitude is maintained — requires PID for zero pointing error."
    },
    equations: [
      { name: "PD under constant disturbance", eq: "Iy·θ̈ + kd·θ̇ + kp·θ = D\nθ∞ = D/kp ≠ 0", explain: "PD cannot null steady-state error. The error is inversely proportional to kp." },

      { name: "Routh-Hurwitz stability (PID)", eq: "Characteristic eq: Iy·s³ + kd·s² + kp·s + ki = 0\nStability: kd > 0, ki > 0, kp > Iy·ki/kd", explain: "Third condition from b₁ > 0 in the Routh array." },
    ],
    derivation: `**PD Control with Constant D (Slides 43-44):**

  Iy·θ̈ + kd·θ̇ + kp·θ = D

At steady state (θ̈ = θ̇ = 0):
  kp·θ∞ = D  ⟹  θ∞ = D/kp  ≠ 0

Can we reduce the error? Yes: increase kp. But this increases 
bandwidth and may amplify noise.

**PID Control (Slides 45-48):**

  Iy·θ̈ + kd·θ̇ + kp·θ + ki·∫θ dt = D

Differentiate:
  Iy·θ⃛ + kd·θ̈ + kp·θ̇ + ki·θ = 0

At steady state (all derivatives zero):
  ki·θ∞ = 0  ⟹  θ∞ = 0  ✓ (if ki ≠ 0)

**Routh-Hurwitz for the PID characteristic eq.:**
  Iy·s³ + kd·s² + kp·s + ki = 0

Routh array:
  s³ |  Iy    kp
  s² |  kd    ki
  s¹ |  b₁    0
  s⁰ |  ki

  b₁ = (kd·kp − Iy·ki) / kd

All first-column elements must be positive:
  1. Iy > 0  ✓ (always)
  2. kd > 0
  3. b₁ > 0  ⟹  kp > Iy·ki/kd
  4. ki > 0`,
    matlab: `%% PD vs PID: Steady-State Error Comparison
Iy = 500; D_const = 0.1;    % [kg·m²], [N·m]

% --- Gains satisfying Routh-Hurwitz ---
kd = 50; ki = 0.005;
kp_min = Iy*ki/kd;          % minimum kp for stability
kp = 2*kp_min;              % safe margin
fprintf('Routh-Hurwitz: kp > %.4f, using kp = %.4f\\n', kp_min, kp);
fprintf('PD steady-state error: %.4f deg\\n', rad2deg(D_const/kp));

dt = 0.5; T = 3000; t = 0:dt:T;

% PD simulation
th_pd = zeros(size(t)); w_pd = zeros(size(t));
for k = 1:length(t)-1
    Tc = -kd*w_pd(k) - kp*th_pd(k);
    a = (D_const + Tc)/Iy;
    w_pd(k+1) = w_pd(k) + a*dt;
    th_pd(k+1) = th_pd(k) + w_pd(k+1)*dt;
end

% PID simulation
th_pid = zeros(size(t)); w_pid = zeros(size(t)); intg = 0;
for k = 1:length(t)-1
    intg = intg + th_pid(k)*dt;
    Tc = -kd*w_pid(k) - kp*th_pid(k) - ki*intg;
    a = (D_const + Tc)/Iy;
    w_pid(k+1) = w_pid(k) + a*dt;
    th_pid(k+1) = th_pid(k) + w_pid(k+1)*dt;
end

figure;
plot(t, rad2deg(th_pd), 'r', t, rad2deg(th_pid), 'b', 'LineWidth', 1.5);
yline(rad2deg(D_const/kp), '--r', sprintf('PD: \\theta_\\infty = %.3f°', rad2deg(D_const/kp)));
yline(0, '--b', 'PID: \\theta_\\infty = 0');
xlabel('Time [s]'); ylabel('\\theta [deg]');
title('PD vs PID under constant disturbance D');
legend('PD','PID','Location','east'); grid on;`,
    traps: [
      "⚠️ MOST ASKED: 'Why is PID better than PD?' Answer: PID nulls steady-state error (θ∞ = 0), PD does not (θ∞ = D/kp).",
      "⚠️ The Routh-Hurwitz condition kp > Iy·ki/kd means you can't choose ki too large relative to kd — otherwise the system becomes unstable!",
      "⚠️ The PID characteristic equation is 3rd order (from differentiating the 2nd-order eq). Don't forget this step.",
      "⚠️ Increasing kp to reduce PD error increases bandwidth and may amplify sensor noise — there's a practical limit."
    ],
    drills: [
      { q: "State the three Routh-Hurwitz stability conditions for PID attitude control.", a: "kd > 0, ki > 0, and kp > Iy·ki/kd. The third condition comes from the b₁ entry in the Routh array being positive." },
      { q: "For PD control with kp = 0.5 N·m/rad and a disturbance D = 0.01 N·m, what is the steady-state error?", a: "θ∞ = D/kp = 0.01/0.5 = 0.02 rad ≈ 1.15°." },
      { q: "Why does differentiating the PID equation eliminate the integral term?", a: "d/dt[∫θ dt] = θ. After differentiation: Iy·θ⃛ + kd·θ̈ + kp·θ̇ + ki·θ = 0. The constant D also disappears because dD/dt = 0." },
    ]

figure;

% Simulate pitch libration

    matlab: `%% DeBra-Delp Stability Diagram
figure; hold on;

C2 = 3*SX + SX.*SZ + 1 > 0;                         % positive sum

C4 = SX > 0 & SZ > 0 & SZ < SX;                     % practical region

stable = C1 & C2 & C3;

% Plot stability region
contourf(SX, SZ, double(stable), [0.5 0.5], 'FaceColor', [0.5 0.8 0.5], 'FaceAlpha', 0.3);

      <line x1={40} y1={30} x2={340} y2={30} stroke={C.err} strokeDasharray="4,3"/>
      <text x={345} y={34} fill={C.err} fontSize={9}>Cmax</text>
      {/* Ramp up */}
      <line x1={40} y1={140} x2={180} y2={30} stroke={C.accent} strokeWidth={2}/>
      {/* Desat event */}
      <line x1={180} y1={30} x2={220} y2={120} stroke={C.ok} strokeWidth={2}/>
      {/* Ramp up again */}
      <line x1={220} y1={120} x2={320} y2={50} stroke={C.accent} strokeWidth={2}/>
      {/* Labels */}
      <text x={100} y={75} fill={C.accent} fontSize={9} transform="rotate(-35,100,75)">D accumulation</text>
      <text x={185} y={90} fill={C.ok} fontSize={9}>desat</text>
      <text x={110} y={150} fill={C.t3} fontSize={9}>tmax</text>
      <line x1={40} y1={145} x2={180} y2={145} stroke={C.t3} strokeWidth={0.5}/>
    </svg>
  );
}

function DeBraDelp() {
  return (
    <svg viewBox="0 0 320 320" style={{width:"100%",maxWidth:320,background:C.bgCard,borderRadius:8,padding:8}}>
      {/* Axes */}
      <line x1={160} y1={10} x2={160} y2={310} stroke={C.t3} strokeWidth={0.8}/>
      <line x1={10} y1={160} x2={310} y2={160} stroke={C.t3} strokeWidth={0.8}/>
      <text x={290} y={155} fill={C.t2} fontSize={10}>σx</text>
      <text x={165} y={18} fill={C.t2} fontSize={10}>σz</text>
      {/* Stability region (Q1, below σz = σx line) */}
      <polygon points="160,160 300,160 300,20" fill={C.ok} opacity={0.08}/>
      <polygon points="160,160 300,160 300,120" fill={C.ok} opacity={0.15}/>
      {/* σz = σx line */}
      <line x1={160} y1={160} x2={300} y2={20} stroke={C.warn} strokeDasharray="4,3" strokeWidth={1}/>
      <text x={280} y={50} fill={C.warn} fontSize={9}>σz = σx</text>
      {/* Practical region label */}
      <text x={210} y={140} fill={C.ok} fontSize={10} fontWeight="bold">Region A</text>
      <text x={195} y={152} fill={C.t3} fontSize={8}>(Iy &gt; Ix &gt; Iz)</text>
      {/* Example point */}
      <circle cx={220} cy={110} r={5} fill={C.err}/>
      <text x={228} y={108} fill={C.err} fontSize={8}>example</text>
      {/* Axis labels */}
      <text x={230} y={175} fill={C.t3} fontSize={8}>σx &gt; 0</text>
      <text x={90} y={175} fill={C.t3} fontSize={8}>σx &lt; 0</text>
      <text x={165} y={130} fill={C.t3} fontSize={8}>σz &gt; 0</text>
      <text x={165} y={200} fill={C.t3} fontSize={8}>σz &lt; 0</text>
    </svg>
  );
}

const DIAGRAMS = {
  acs_overview: ACSBlockDiagram,
  second_order: StepResponseSketch,
  reaction_wheels: DesatDiagram,
  triaxial_stability: DeBraDelp,
};

// ─── TAB NAMES ──────────────────────────────────────────
const TABS = ["Overview","Equations","Derivation","MATLAB","Exam Traps","Drill"];
const TAB_ICONS = ["📖","📝","🔍","💻","⚠️","🎯"];

// ─── MAIN APP ───────────────────────────────────────────
function App() {
  const [activeSection, setActiveSection] = useState("notation");
  const [activeTab, setActiveTab] = useState(0);
  const [notationFilter, setNotationFilter] = useState("");
  const [drillReveal, setDrillReveal] = useState({});
  const [expandedDeriv, setExpandedDeriv] = useState(true);

  const activeModule = MODULES.find(m => m.id === activeSection);
  const DiagramComponent = DIAGRAMS[activeSection];

  const filteredNotation = useMemo(() => {
    if (!notationFilter) return NOTATION;
    const q = notationFilter.toLowerCase();
    return NOTATION.map(cat => ({
      ...cat,
      rows: cat.rows.filter(r =>
        r.sym.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q) || r.detail.toLowerCase().includes(q)
      )
    })).filter(cat => cat.rows.length > 0);
  }, [notationFilter]);

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'IBM Plex Sans','Segoe UI',system-ui,sans-serif",background:C.bg,color:C.t1,overflow:"hidden"}}>
      {/* ─── SIDEBAR ─── */}
      <div style={{width:230,minWidth:230,background:C.bgCard,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 14px 10px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:10,color:C.t3,fontFamily:"monospace",letterSpacing:1}}>SMS • SAPIENZA</div>
          <div style={{fontSize:13,fontWeight:600,marginTop:2}}>Ch 2B: Attitude Control</div>
          <div style={{fontSize:10,color:C.t3}}>Slides 1–67 (First 40%)</div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:6}}>
          {/* Notation Table button */}
          <button onClick={()=>{setActiveSection("notation");setActiveTab(0);}}
            style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:6,cursor:"pointer",border:"none",background:activeSection==="notation"?C.bgHover:"transparent",width:"100%",textAlign:"left",borderLeft:activeSection==="notation"?`3px solid ${C.accent}`:"3px solid transparent",transition:"all .15s"}}>
            <span style={{fontSize:14}}>📑</span>
            <span style={{fontSize:12,fontWeight:500,color:activeSection==="notation"?C.t1:C.t2}}>Notation Table</span>
          </button>
          {/* Module buttons */}
          {MODULES.map(m => (
            <button key={m.id} onClick={()=>{setActiveSection(m.id);setActiveTab(0);setDrillReveal({});}}
              style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,cursor:"pointer",border:"none",background:activeSection===m.id?C.bgHover:"transparent",width:"100%",textAlign:"left",borderLeft:activeSection===m.id?`3px solid ${C.accent}`:"3px solid transparent",marginTop:2,transition:"all .15s"}}>
              <span style={{fontSize:13,flexShrink:0}}>{m.icon}</span>
              <div style={{minWidth:0}}>
                <div style={{fontSize:11,fontWeight:500,color:activeSection===m.id?C.t1:C.t2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.num}. {m.title}</div>
                <div style={{fontSize:9,color:C.t3,fontFamily:"monospace"}}>{m.pages}</div>
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* ─── MAIN CONTENT ─── */}
      <div style={{flex:1,overflowY:"auto",padding:"20px 28px"}}>
        {activeSection === "notation" ? (
          /* ─── NOTATION TABLE ─── */
          <div>
            <h2 style={{fontSize:18,fontWeight:700,marginBottom:4}}>📑 Master Notation Table</h2>
            <p style={{fontSize:12,color:C.t3,marginBottom:12}}>All symbols used in the Attitude Control chapter (Sidi reference + class slides)</p>
            <input placeholder="🔍 Search symbols, names, descriptions..." value={notationFilter} onChange={e=>setNotationFilter(e.target.value)}
              style={{width:"100%",maxWidth:500,padding:"8px 12px",borderRadius:6,border:`1px solid ${C.border}`,background:C.bgCard,color:C.t1,fontSize:12,marginBottom:16,outline:"none"}}/>
            {filteredNotation.map((cat,ci) => (
              <div key={ci} style={{marginBottom:20}}>
                <h3 style={{fontSize:14,fontWeight:600,color:C.accent,marginBottom:8,borderBottom:`1px solid ${C.border}`,paddingBottom:4}}>{cat.cat}</h3>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{borderBottom:`1px solid ${C.border}`}}>
                        {["Symbol","Description","Details / Exam Notes"].map(h => (
                          <th key={h} style={{textAlign:"left",padding:"6px 10px",color:C.t3,fontWeight:500,fontSize:11}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {cat.rows.map((r,ri) => (
                        <tr key={ri} style={{borderBottom:`1px solid ${C.border}22`}}>
                          <td style={{padding:"6px 10px",fontFamily:"monospace",color:C.warn,fontWeight:600,whiteSpace:"nowrap"}}>{r.sym}</td>
                          <td style={{padding:"6px 10px",color:C.t2}}>{r.desc}</td>
                          <td style={{padding:"6px 10px",color:C.t3,fontSize:11}}>{r.detail}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            ))}
          </div>
        ) : activeModule ? (
          /* ─── MODULE VIEW ─── */
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
              <span style={{fontSize:22}}>{activeModule.icon}</span>
              <div>
                <h2 style={{fontSize:17,fontWeight:700}}>Module {activeModule.num}: {activeModule.title}</h2>
                <span style={{fontSize:11,color:C.t3,fontFamily:"monospace"}}>{activeModule.pages}</span>
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:4,marginTop:12,marginBottom:16,flexWrap:"wrap"}}>
              {TABS.map((tab,i) => (
                <button key={tab} onClick={()=>setActiveTab(i)}
                  style={{padding:"6px 14px",borderRadius:6,border:`1px solid ${activeTab===i?C.accent:C.border}`,background:activeTab===i?C.accentGlow:"transparent",color:activeTab===i?C.accent:C.t2,fontSize:12,cursor:"pointer",fontWeight:activeTab===i?600:400,transition:"all .15s"}}>
                  {TAB_ICONS[i]} {tab}
                </button>
              ))}
            </div>

            {/* Tab Content */}
            <div style={{background:C.bgCard,borderRadius:10,border:`1px solid ${C.border}`,padding:20}}>
              {activeTab === 0 && (
                <div>
                  <div style={{background:C.accentGlow,borderRadius:8,padding:14,marginBottom:14,borderLeft:`3px solid ${C.accent}`}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.accent,marginBottom:4}}>💡 Why This Matters</div>
                    <div style={{fontSize:13,color:C.t2,lineHeight:1.6}}>{activeModule.overview.why}</div>
                  </div>
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.ok,marginBottom:4}}>🎯 Learning Objective</div>
                    <div style={{fontSize:13,color:C.t2,lineHeight:1.6}}>{activeModule.overview.objective}</div>
                  </div>
                  <div style={{background:`${C.warn}11`,borderRadius:8,padding:14,borderLeft:`3px solid ${C.warn}`}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.warn,marginBottom:4}}>🛰️ Real Mission Example</div>
                    <div style={{fontSize:13,color:C.t2,lineHeight:1.6}}>{activeModule.overview.realMission}</div>
                  </div>
                  {DiagramComponent && (
                    <div style={{marginTop:16}}>
                      <div style={{fontSize:12,fontWeight:600,color:C.t2,marginBottom:6}}>📊 Diagram</div>
                      <DiagramComponent/>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 1 && (
                <div>
                  {activeModule.equations.map((eq,i) => (
                    <div key={i} style={{marginBottom:16,background:C.bg,borderRadius:8,padding:14,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:12,fontWeight:600,color:C.accent,marginBottom:6}}>{eq.name}</div>
                      <pre style={{fontFamily:"'JetBrains Mono','Fira Code',monospace",fontSize:12,color:C.warn,whiteSpace:"pre-wrap",lineHeight:1.5,margin:0}}>{eq.eq}</pre>
                      <div style={{fontSize:11,color:C.t3,marginTop:8,lineHeight:1.5}}>{eq.explain}</div>
                    </div>
                  ))}
                </div>
              )}

              {activeTab === 2 && (
                <div>
                  <button onClick={()=>setExpandedDeriv(!expandedDeriv)}
                    style={{fontSize:12,color:C.accent,background:"none",border:"none",cursor:"pointer",marginBottom:8}}>
                    {expandedDeriv ? "▼ Collapse" : "▶ Expand"} Full Derivation
                  </button>
                  {expandedDeriv && (
                    <pre style={{fontFamily:"'JetBrains Mono','Fira Code',monospace",fontSize:11.5,color:C.t2,whiteSpace:"pre-wrap",lineHeight:1.6,background:C.bg,borderRadius:8,padding:16,border:`1px solid ${C.border}`,overflowX:"auto"}}>{activeModule.derivation}</pre>
                  )}
                </div>
              )}

              {activeTab === 3 && (
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:11,color:C.ok,fontFamily:"monospace"}}>% Ready-to-run MATLAB code</span>
                  </div>
                  <pre style={{fontFamily:"'JetBrains Mono','Fira Code',monospace",fontSize:11,color:C.t1,whiteSpace:"pre-wrap",lineHeight:1.5,background:"#0a0d16",borderRadius:8,padding:16,border:`1px solid ${C.border}`,overflowX:"auto"}}>{activeModule.matlab}</pre>
                </div>
              )}

              {activeTab === 4 && (
                <div>
                  {activeModule.traps.map((trap,i) => (
                    <div key={i} style={{background:`${C.err}11`,borderRadius:8,padding:12,marginBottom:10,borderLeft:`3px solid ${C.err}`,fontSize:13,color:C.t2,lineHeight:1.6}}>
                      {trap}
                    </div>
                  ))}
                </div>
              )}

              {activeTab === 5 && (
                <div>
                  {activeModule.drills.map((d,i) => (
                    <div key={i} style={{marginBottom:14}}>
                      <div style={{background:C.bg,borderRadius:8,padding:12,border:`1px solid ${C.border}`}}>
                        <div style={{fontSize:12,fontWeight:600,color:C.accent,marginBottom:4}}>Q{i+1}: {d.q}</div>
                        <button onClick={()=>setDrillReveal(prev=>({...prev,[`${activeSection}-${i}`]:!prev[`${activeSection}-${i}`]}))}
                          style={{fontSize:11,color:C.ok,background:"none",border:`1px solid ${C.ok}33`,borderRadius:4,padding:"3px 10px",cursor:"pointer",marginTop:4}}>
                          {drillReveal[`${activeSection}-${i}`] ? "Hide Answer" : "Reveal Answer"}
                        </button>
                        {drillReveal[`${activeSection}-${i}`] && (
                          <div style={{marginTop:8,padding:10,background:`${C.ok}11`,borderRadius:6,fontSize:12,color:C.t2,lineHeight:1.6,borderLeft:`3px solid ${C.ok}`}}>
                            ✅ {d.a}
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        ) : null}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
