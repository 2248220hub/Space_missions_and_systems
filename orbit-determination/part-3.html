matlab:`function demo_woodbury()
% Verify Woodbury: (HŠĶÄR‚ĀĽ¬ĻH + PŐĄ‚ĀĽ¬Ļ)‚ĀĽ¬Ļ = (I-KH)PŐĄ
  n=6; p=2;
  P_bar = diag(rand(n,1)*100);     % a priori cov
  H     = randn(p,n);              % obs matrix
  R     = diag(rand(p,1)*0.01);    % obs noise cov

  % Method 1: direct inversion (n√ón)
  P_direct = inv(H'*(R\H) + inv(P_bar));

  % Method 2: KF gain form (p√óp inversion only!)
  S  = H*P_bar*H' + R;            % p√óp innovation cov
  K  = P_bar*H' * (S\eye(p));     % Kalman gain [n√óp]
  P_kf = (eye(n) - K*H) * P_bar; % standard form

  % Method 3: Joseph form (most stable)
  ImKH = eye(n) - K*H;
  P_joseph = ImKH*P_bar*ImKH' + K*R*K';

  fprintf('Direct vs Joseph: %.2e\\n', norm(P_direct-P_joseph,'fro'));
  fprintf('All should be ~0 (machine precision)\\n');
end`,

{label:"Step 5 ‚ÄĒ Advance",text:"k‚Üźk+1, reinitialise ő¶=I, return to Step 1. The full state estimate at t‚āĖ: XŐā‚āĖ=X‚āĖ*+xŐā‚āĖ."},
],

{label:"Step 1 ‚ÄĒ Integration",eq:"Šļä* = F(X*,t),  ő¶Őá = A(t)ő¶(t,t‚āĖ‚āč‚āĀ)\nfrom t‚āĖ‚āč‚āĀ to t‚āĖ, with ő¶(t‚āĖ‚āč‚āĀ,t‚āĖ‚āč‚āĀ)=I",note:"42 ODEs for n=6. Use ode113 in MATLAB."},
{label:"Step 2 ‚ÄĒ Time update (Eq.4.7.17) ‚ėÖ‚ėÖ",eq:"xŐĄ‚āĖ = ő¶(t‚āĖ,t‚āĖ‚āč‚āĀ) xŐā‚āĖ‚āč‚āĀ\nPŐĄ‚āĖ = ő¶(t‚āĖ,t‚āĖ‚āč‚āĀ) P‚āĖ‚āč‚āĀ ő¶ŠĶÄ(t‚āĖ,t‚āĖ‚āč‚āĀ)   [+ őďQőďŠĶÄ if SNC]",note:"ő¶ŠĶÄ on the RIGHT. Overbars = a priori (before measurement update)."},
{label:"Step 3 ‚ÄĒ Observation",eq:"y‚āĖ = Y‚āĖ ‚ąí G(X‚āĖ*, t‚āĖ)        [O‚ąíC residual]\nH‚āĖ = [‚ąāG(X,t‚āĖ)/‚ąāX]*‚āĖ        [NO STM!  evaluated at current time]",note:"KEY difference from batch: no ő¶ multiplication on H‚āĖ. STM is reset to I each epoch."},

{label:"Covariance trace behaviour (Fig.4.7.2)",eq:"trace(P‚āĖ) = trace(PŐĄ‚āĖ) ‚ąí trace(K‚āĖH‚āĖPŐĄ‚āĖ)\n\nGrows between obs (time update)\nDrops at each obs (meas. update)\n\nProblem: as P‚āĖ‚Üí0, K‚āĖ‚Üí0 ‚Üí FILTER SATURATION",note:"Solution: add process noise Q (¬ß4.9) to keep PŐĄ‚āĖ above zero"},

derivation:`SEQUENTIAL KF ALGORITHM ‚ÄĒ COMPLETE (TSB Fig.4.7.1):

‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź INITIALISE ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
  k = 1,  ti-1 = t0
  xŐā‚āÄ = xŐĄ‚āÄ  (a priori state deviation)
  P‚āÄ         (a priori covariance)

‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź LOOP: for each observation at t‚āĖ ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź

STEP 1 ‚ÄĒ INTEGRATE from t‚āĖ‚āč‚āĀ to t‚āĖ:
  Šļä* = F(X*,t)                 [orbit ODE, n equations]
  ő¶Őá  = A(t)ő¶,  ő¶(t‚āĖ‚āč‚āĀ,t‚āĖ‚āč‚āĀ)=I [STM ODE, n¬≤ equations]
  ‚Üí yields X*(t‚āĖ),  ő¶(t‚āĖ,t‚āĖ‚āč‚āĀ)

STEP 2 ‚ÄĒ TIME UPDATE:
  xŐĄ‚āĖ = ő¶(t‚āĖ,t‚āĖ‚āč‚āĀ) ¬∑ xŐā‚āĖ‚āč‚āĀ         [predict state]
  PŐĄ‚āĖ = ő¶(t‚āĖ,t‚āĖ‚āč‚āĀ) ¬∑ P‚āĖ‚āč‚āĀ ¬∑ ő¶ŠĶÄ     [predict cov]

STEP 3 ‚ÄĒ OBS MODEL (NO STM ON H!):
  y‚āĖ = Y‚āĖ ‚ąí G(X‚āĖ*,t‚āĖ)              [O-C residual]
  H‚āĖ = [‚ąāG/‚ąāX]* at (X‚āĖ*,t‚āĖ)        [local partials]

STEP 4 ‚ÄĒ MEASUREMENT UPDATE:
  K‚āĖ = PŐĄ‚āĖH‚āĖŠĶÄ ¬∑ inv(H‚āĖPŐĄ‚āĖH‚āĖŠĶÄ + R‚āĖ)  [Kalman gain]
  xŐā‚āĖ = xŐĄ‚āĖ + K‚āĖ(y‚āĖ ‚ąí H‚āĖxŐĄ‚āĖ)          [update state]
  P‚āĖ = (I‚ąíK‚āĖH‚āĖ)PŐĄ‚āĖ(I‚ąíK‚āĖH‚āĖ)ŠĶÄ + K‚āĖR‚āĖK‚āĖŠĶÄ [Joseph form!]

STEP 5:
  k ‚Üź k+1,  reinitialise ő¶=I,  ti-1 = t‚āĖ
  Full state: XŐā‚āĖ = X‚āĖ* + xŐā‚āĖ
  GOTO STEP 1`,
matlab:`function [x_hist, P_hist] = kalman_filter(Y, t_obs, X0_star, P0, x0_hat, R)
% Sequential KF ‚ÄĒ TSB Fig.4.7.1
  n = length(X0_star);  n_obs = length(t_obs);
  x_hist = zeros(n, n_obs);  P_hist = zeros(n, n, n_obs);

  X_star = X0_star;  x_hat = x0_hat;  P = P0;  t_prev = 0;

  for k = 1:n_obs
    %% STEP 1: Integrate orbit + STM
    Phi0 = eye(n);
    [X_star, Phi] = propagate_orbit_stm(X_star, Phi0, t_prev, t_obs(k));

    %% STEP 2: Time update
    x_bar = Phi * x_hat;               % predict state
    P_bar = Phi * P * Phi';            % predict cov  (ő¶ŠĶÄ on RIGHT!)
    % If SNC: P_bar = P_bar + Gamma*Q*Gamma';

    %% STEP 3: Observation model (NO STM on H!)
    [G_k, H_k] = obs_model(X_star, t_obs(k));  % H_k = [‚ąāG/‚ąāX]*
    y_k = Y(k,:)' - G_k;               % O-C residual

    %% STEP 4: Measurement update
    S_k = H_k * P_bar * H_k' + R;      % innovation cov [p√óp]
    K_k = P_bar * H_k' / S_k;          % Kalman gain    [n√óp]
    x_hat = x_bar + K_k*(y_k - H_k*x_bar);  % update state
    % Joseph form (numerically stable):
    ImKH = eye(n) - K_k*H_k;
    P = ImKH * P_bar * ImKH' + K_k * R * K_k';

    %% STEP 5: Store, update reference, advance
    x_hist(:,k) = x_hat;  P_hist(:,:,k) = P;
    X_star = X_star + x_hat;  % update reference (EKF mode)
    t_prev = t_obs(k);
  end
end`,
traps:["In KF: H‚āĖ=[‚ąāG/‚ąāX]*‚āĖ ‚ÄĒ NO STM multiplication. In batch: HŠĶĘ=HŐÉŠĶĘő¶(tŠĶĘ,t‚āÄ) ‚ÄĒ WITH STM. Confusing these is the #1 KF exam error.","STM ő¶ is reinitialised to I after each observation epoch. A new integration from ő¶=I starts for each step.","Always use Joseph form in MATLAB code. Standard form P‚āĖ=(I‚ąíKH)PŐĄ‚āĖ loses positive-definiteness in finite precision.","P‚āĖ‚Üí0 with many observations ‚Üí K‚āĖ‚Üí0 ‚Üí filter insensitive to new data ‚Üí divergence. Cure: add process noise Q (¬ß4.9)."],

{q:"What is the critical difference between H‚āĖ in the KF and HŠĶĘ in the batch processor?",a:"KF: H‚āĖ=[‚ąāG/‚ąāX]*‚āĖ evaluated at (X‚āĖ*,t‚āĖ) ‚ÄĒ NO STM multiplication. Each obs processed at its own time ‚ÄĒ no epoch mapping needed. STM only propagates xŐĄ‚āĖ and PŐĄ‚āĖ between epochs. Batch: HŠĶĘ=HŐÉŠĶĘő¶(tŠĶĘ,t‚āÄ) ‚ÄĒ observation partials mapped to epoch t‚āÄ via STM. All obs referenced to single epoch."}]
},
{id:3,icon:"ūüĆÄ",title:"Extended KF (EKF) and prediction residual",badge:"¬ß4.7.2‚Äď4.7.4 ¬∑ pp.209‚Äď211",
why:"<strong>Why EKF?</strong> Orbit dynamics are strongly nonlinear. The standard KF's fixed reference accumulates linearisation error. The EKF updates X*(t) after each observation, keeping the deviation xŐā‚āĖ‚Čą0 and linearisation valid at every step. Faster convergence for nonlinear problems.",
objective:"State the EKF reference update rule (Eq.4.7.28) and the simplified state update (Eq.4.7.29). Understand why xŐā‚āĖ‚āä‚āĀ=K‚āĖ‚āä‚āĀy‚āĖ‚āä‚āĀ in EKF mode.",
overview:[
{label:"Standard KF ‚ÄĒ fixed reference",text:"Reference X*(t) stays fixed for all k. xŐā‚āĖ accumulates as a growing deviation. If |X‚ąíX*| grows large, linearisation error accumulates ‚Üí possible divergence. STM integrated over the full arc."},
{label:"EKF ‚ÄĒ update reference each step",text:"After processing obs k: (X‚āĖ*)new = XŐā‚āĖ = X‚āĖ*+xŐā‚āĖ (Eq.4.7.28). This resets xŐā‚āĖ=0 as new starting point. Next step starts with xŐĄ‚āĖ‚āä‚āĀ=ő¶¬∑0=0. Linearisation errors minimised at every step."},
{label:"Simplified EKF state update",text:"Since xŐĄ‚āĖ‚āä‚āĀ=0 after reference update, the measurement update simplifies: xŐā‚āĖ‚āä‚āĀ=0+K‚āĖ‚āä‚āĀ(y‚āĖ‚āä‚āĀ‚ąíH‚āĖ‚āä‚āĀ¬∑0)=K‚āĖ‚āä‚āĀy‚āĖ‚āä‚āĀ (Eq.4.7.29). The prior xŐĄ term vanishes."},
{label:"Prediction residual (¬ß4.7.4)",text:"ő≤‚āĖ=y‚āĖ‚ąíH‚āĖxŐĄ‚āĖ [before update]. őĶŐā‚āĖ=y‚āĖ‚ąíH‚āĖxŐā‚āĖ [after update]. Monitor ‚ÄĖő≤‚āĖ‚ÄĖ decreasing ‚Üí filter converging. TSB note: don't update reference using first observations ‚ÄĒ wait for xŐā to stabilise."},
],
equations:[
{label:"EKF reference update (Eq.4.7.28)",eq:"After processing obs k:\n(X*‚āĖ)new = XŐā‚āĖ = X*‚āĖ + xŐā‚āĖ\n\nThis sets xŐā‚āĖ = 0 for next step (new reference = best estimate)",note:"Linearisation error minimised at each step"},
{label:"EKF simplified state update (Eq.4.7.29)",eq:"xŐā‚āĖ‚āä‚āĀ = K‚āĖ‚āä‚āĀ y‚āĖ‚āä‚āĀ\n\n(because xŐĄ‚āĖ‚āä‚āĀ = ő¶¬∑xŐā‚āĖ = ő¶¬∑0 = 0 after reference update)",note:"The prior xŐĄ term drops out ‚ÄĒ simpler than standard KF update"},
{label:"Innovation and prediction residual (¬ß4.7.4)",eq:"Pre-update:  ő≤‚āĖ = y‚āĖ ‚ąí H‚āĖ xŐĄ‚āĖ   [innovation]\nPost-update: őĶŐā‚āĖ = y‚āĖ ‚ąí H‚āĖ xŐā‚āĖ   [post-fit residual]\n\nConvergence: ‚ÄĖő≤‚āĖ‚ÄĖ ‚Üí 0  as filter learns true orbit",note:"If ő≤‚āĖ stays large: divergence or major model error"},
],
derivation:`EKF vs STANDARD KF ‚ÄĒ COMPARISON:

STANDARD KF:
  Reference X*(t) fixed for all steps
  xŐā‚āĖ grows as deviation from fixed reference
  Time update: xŐĄ‚āĖ = ő¶ ¬∑ xŐā‚āĖ‚āč‚āĀ  (can be large)
  State update: xŐā‚āĖ = xŐĄ‚āĖ + K‚āĖ(y‚āĖ ‚ąí H‚āĖxŐĄ‚āĖ)
  Risk: |xŐā| grows ‚Üí linearisation breaks ‚Üí diverge

EKF:
  After step k: (X*‚āĖ)new = X*‚āĖ + xŐā‚āĖ  (Eq.4.7.28)
  This makes xŐā‚āĖ = 0 the new reference deviation

  Next time update: xŐĄ‚āĖ‚āä‚āĀ = ő¶ ¬∑ 0 = 0  ‚Üź always zero!

  State update simplifies:
    xŐā‚āĖ‚āä‚āĀ = xŐĄ‚āĖ‚āä‚āĀ + K‚āĖ‚āä‚āĀ(y‚āĖ‚āä‚āĀ ‚ąí H‚āĖ‚āä‚āĀ xŐĄ‚āĖ‚āä‚āĀ)
           = 0     + K‚āĖ‚āä‚āĀ(y‚āĖ‚āä‚āĀ ‚ąí H‚āĖ‚āä‚āĀ ¬∑ 0)
           = K‚āĖ‚āä‚āĀ y‚āĖ‚āä‚āĀ   (Eq.4.7.29) ‚úď

WHY EKF CONVERGES FASTER:
  Linearisation error O(|x|¬≤) is smaller at each step
  because |xŐā‚āĖ|‚Čą0 (just updated from previous obs).
  Standard KF: |xŐā‚āĖ| can grow large ‚Üí O(|x|¬≤) large.`,
matlab:`%% EKF reference update ‚ÄĒ code addition to KF loop
% After STEP 4 measurement update, add:

% Standard KF: do NOT update reference
% EKF: update reference to absorb xŐā‚āĖ
if use_ekf && norm(x_hat) < ekf_threshold
    % Update reference trajectory
    X_star_new = X_star + x_hat;   % Eq.4.7.28: (X*‚āĖ)new = X*‚āĖ + xŐā‚āĖ
    X_star = X_star_new;

    % xŐā‚āĖ becomes 0 ‚ÄĒ confirmed by next time update giving xŐĄ‚āĖ‚āä‚āĀ=0
    x_hat = zeros(n,1);            % reset deviation

    % NOTE: do NOT restart Phi here ‚ÄĒ still integrate from current epoch
    % NOTE: in EKF mode xŐā‚āĖ‚āä‚āĀ = K‚āĖ‚āä‚āĀ y‚āĖ‚āä‚āĀ  (Eq.4.7.29)
    %       since xŐĄ‚āĖ‚āä‚āĀ = Phi * x_hat = Phi * 0 = 0
end

% EKF threshold: only update reference once x_hat is stable
% (don't update on first few observations ‚ÄĒ noise dominates early)`,
traps:["EKF advantage: convergence is faster because O(|x|¬≤) linearisation error is smaller at each step. But NOT guaranteed convergence for strongly nonlinear problems.","In EKF: STM ő¶ cannot be used to map xŐā between epochs (since xŐā‚āĖ=0 after update). Covariance P(t) must be propagated by integrating Eq.4.9.35 or via Eq.4.9.50 with SNC.","TSB note: do NOT update reference using first observations ‚ÄĒ wait for xŐā to stabilise first. Early noise causes bad reference updates ‚Üí divergence.","'Extended' in EKF refers to updating the reference ‚ÄĒ NOT to extending the mathematical formulation. The estimator equations are identical."],
drills:[{q:"What is the key algorithmic difference between the standard KF and the EKF? Write the EKF state update equation and explain why it simplifies.",a:"Standard KF: reference X*(t) is fixed. xŐā‚āĖ accumulates as a growing deviation. EKF: after each obs k, update (X*‚āĖ)new=X*‚āĖ+xŐā‚āĖ (Eq.4.7.28), resetting xŐā‚āĖ=0. Because xŐĄ‚āĖ‚āä‚āĀ=ő¶¬∑0=0, the next update simplifies to: xŐā‚āĖ‚āä‚āĀ=0+K‚āĖ‚āä‚āĀ(y‚āĖ‚āä‚āĀ‚ąíH‚āĖ‚āä‚āĀ¬∑0)=K‚āĖ‚āä‚āĀy‚āĖ‚āä‚āĀ (Eq.4.7.29). The xŐĄ term drops out entirely."}]
},

matlab:`function spring_mass_batch()
% Spring-mass batch OD ‚ÄĒ TSB ¬ß4.8.2 + Prof Iess notes pp.87-90
  global w h_stat

  %% Physical parameters (from your MATLAB project)
  k1=2.50; k2=13.70; m=25; h_stat=50.4;
  w = sqrt((k1+k2)/m);           % angular frequency

  %% True initial conditions (hidden from estimator)
  x0_true = 3.0; v0_true = 0.0;
  X_true = [x0_true; v0_true];

  %% Simulate observations
  t_obs = linspace(0, 60, 300)';  % 300 epochs over 60s
  sigma_rho = 0.1; sigma_rho_dot = 0.01;
  R = diag([sigma_rho^2; sigma_rho_dot^2]);

  X_traj = zeros(length(t_obs), 2);
  Y_obs  = zeros(length(t_obs), 2);
  for i=1:length(t_obs)
    tau = t_obs(i);
    Phi_i = stm_spring(tau);
    X_traj(i,:) = (Phi_i * X_true)';
    Y_obs(i,:) = obs_spring(X_traj(i,:)') + ...
                 [sigma_rho; sigma_rho_dot].*randn(2,1);
  end

  %% Batch processor (TSB Fig.4.6.1)
  X_star = [6.5; 0.05];  x_bar = zeros(2,1);
  P_bar = diag([1e6, 1e6]);

  for iter = 1:10
    Lambda = inv(P_bar);  Nu = inv(P_bar)*x_bar;
    for i=1:length(t_obs)
      tau = t_obs(i);
      Phi_i   = stm_spring(tau);        % STM
      X_i     = Phi_i * X_star;         % reference at tŠĶĘ
      [G_i, H_tilde_i] = obs_spring(X_i);
      Hi = H_tilde_i * Phi_i;           % MAP TO EPOCH!
      yi = Y_obs(i,:)' - G_i;
      Lambda = Lambda + Hi'*(R\Hi);
      Nu     = Nu     + Hi'*(R\yi);
    end
    x_hat = Lambda \ Nu;
    P_hat = inv(Lambda);
    X_star = X_star + x_hat;  x_bar = x_bar - x_hat;
    fprintf('Iter %d: |xŐā|=%.3e  x‚āÄ=%.4f  v‚āÄ=%.4f\\n',...
            iter,norm(x_hat),X_star(1),X_star(2));
    if norm(x_hat)<1e-10, break; end
  end
  fprintf('True: x‚āÄ=%.4f, v‚āÄ=%.4f\\n', x0_true, v0_true);
  fprintf('Sigma: [%.4f m, %.4f m/s]\\n', sqrt(P_hat(1,1)), sqrt(P_hat(2,2)));
end

function Phi = stm_spring(tau)
% Spring-mass STM (analytical)
  global w
  Phi = [cos(w*tau),    sin(w*tau)/w;
         -w*sin(w*tau), cos(w*tau)];
end

function [G, H_tilde] = obs_spring(X)
% Range and range-rate observables + partials
  global h_stat
  x=X(1); xd=X(2);
  rho     = sqrt(x^2 + h_stat^2);
  rho_dot = x*xd/rho;
  G = [rho; rho_dot];
  H_tilde = [x/rho,            0;
             xd*h_stat^2/rho^3, x/rho];
end`,

objective:"Derive the SNC time-update covariance Eq.4.9.50 via variation of parameters. Write P‚āĖ‚āä‚āĀ=ő¶P‚āĖő¶ŠĶÄ+őďQőďŠĶÄ. Understand why the batch processor cannot use process noise efficiently.",

{label:"The divergence problem",text:"Without Q: trace(P‚āĖ)‚Üí0 as ‚Ąď‚Üí‚ąě. Once P‚āĖ small: K‚āĖ=P‚āĖH‚āĖŠĶÄ(H‚āĖP‚āĖH‚āĖŠĶÄ+R‚āĖ)‚ĀĽ¬Ļ‚Čą0. Filter completely ignores new measurements. Any model error (unmodelled drag fluctuation) makes estimate drift undetected."},
{label:"SNC model (Eq.4.9.1)",text:"Šļč(t)=A(t)x(t)+B(t)u(t). u(t) = white noise with E[u(t)uŠĶÄ(ŌĄ)]=Q(t)őī(t‚ąíŌĄ). B(t) maps noise into state space (e.g. B=[0;1]ŠĶÄ for acceleration noise)."},
{label:"SNC time-update covariance (Eq.4.9.50)",text:"PŐĄ‚āĖ‚āä‚āĀ=ő¶(t‚āĖ‚āä‚āĀ,t‚āĖ)P‚āĖő¶ŠĶÄ(t‚āĖ‚āä‚āĀ,t‚āĖ)+őď(t‚āĖ‚āä‚āĀ,t‚āĖ)Q‚āĖőďŠĶÄ(t‚āĖ‚āä‚āĀ,t‚āĖ). The extra őďQőďŠĶÄ term prevents P from collapsing. The balance between őďQőďŠĶÄ growing P and K‚āĖ reducing P creates a steady-state filter."},

derivation:`SNC COVARIANCE DERIVATION ‚ÄĒ Eq.4.9.50:

From variation of parameters:
  x(t‚āĖ‚āä‚āĀ) = ő¶¬∑x(t‚āĖ) + őď¬∑√Ľ‚āĖ

  PŐĄ‚āĖ‚āä‚āĀ = E[(ő¶xŐÉ‚āĖ + őď√Ľ‚āĖ)(ő¶xŐÉ‚āĖ + őď√Ľ‚āĖ)ŠĶÄ]

matlab:`function [x_hist, P_hist] = kf_with_snc(Y, t_obs, X0_star, P0, x0, R, sigma_u)
% KF with State Noise Compensation (SNC) ‚ÄĒ Eq.4.9.50
  n=length(X0_star); n_obs=length(t_obs);
  x_hist=zeros(n,n_obs); P_hist=zeros(n,n,n_obs);
  X_star=X0_star; x_hat=x0; P=P0; t_prev=0;

  for k=1:n_obs
    dt = t_obs(k) - t_prev;

    %% STEP 1: Propagate (orbit + STM)
    [X_star, Phi] = propagate(X_star, t_prev, t_obs(k));

    %% STEP 2: Time update WITH SNC (Eq.4.9.50)
    x_bar = Phi * x_hat;
    % Process noise matrix for constant acceleration noise
    % B = [0;1] (accel noise maps to velocity)
    % Gamma = ‚ąęPhi(t,tau)*B dtau = [dt¬≤/2; dt]
    Gamma = [dt^2/2; dt];                       % [2√ó1] for 2-state
    Q_k   = sigma_u^2;                          % scalar Q
    P_bar = Phi*P*Phi' + Gamma*Q_k*Gamma';      % Eq.4.9.50: add őďQőďŠĶÄ!

    %% STEP 3: Obs model
    [G_k, H_k] = obs_model(X_star, t_obs(k));
    y_k = Y(k,:)' - G_k;

    %% STEP 4: Measurement update (Joseph form)
    S_k = H_k*P_bar*H_k' + R;
    K_k = P_bar*H_k' / S_k;
    x_hat = x_bar + K_k*(y_k - H_k*x_bar);
    ImKH = eye(n) - K_k*H_k;
    P = ImKH*P_bar*ImKH' + K_k*R*K_k';

    x_hist(:,k)=x_hat; P_hist(:,:,k)=P;
    t_prev=t_obs(k);
  end
end

matlab:`function dmc_filter_demo()
% DMC (Dynamic Model Compensation) ‚ÄĒ Gauss-Markov process
% Appendix F of TSB

  %% Parameters
  tau = 200;   % correlation time [s]
  beta = 1/tau;
  sigma_u = 0.26; % tuned per Appendix F example

  %% DMC augmented state transition matrix
  function Phi_aug = stm_dmc(dt, beta)
    e = exp(-beta*dt);
    Phi_aug = [1, dt, (dt/beta + (e-1)/beta^2);
               0, 1,  (1-e)/beta;
               0, 0,  e];
  end

  %% Process noise covariance for DMC (Appendix F)
  function Q_aug = pnc_dmc(dt, beta, sigma_u)
    % Qő∑ = ŌÉ¬≤ŠĶ§ ¬∑ ‚ąęő¶(:,3)¬∑ő¶(:,3)ŠĶÄ dŌĄ  (see TSB Appendix F)
    % Simplified for small ő≤¬∑dt:
    e = exp(-2*beta*dt);
    Q33 = sigma_u^2/(2*beta)*(1-e);
    Q23 = sigma_u^2/beta^2*(0.5*(1-e) - beta*dt*e);
    Q13 = sigma_u^2/beta^3*(1-e - beta*dt*(1+e));
    Q22 = sigma_u^2/beta*(dt + (e-1)/(2*beta));
    Q12 = sigma_u^2/beta^2*(0.5*(1-e) - e*beta*dt);
    Q11 = sigma_u^2/beta^3*(beta*dt + 2*(e-1) + 0.5*(1-e^2)/beta);
    Q_aug = [Q11 Q12 Q13; Q12 Q22 Q23; Q13 Q23 Q33];
  end

  %% State estimate: [pos; vel; eta_estimate]
  n=3;
  x_hat = [0; 0; 0];   % initial deviation
  P = diag([1000^2, 10^2, 0.1^2]);

  fprintf('DMC filter ready: tau=%.0fs, sigma_u=%.3f\\n', tau, sigma_u);
  fprintf('Key: eta (3rd state) estimates unmodelled acceleration\\n');
end`,
traps:["Correlation time ŌĄ=1/ő≤. Larger ŌĄ ‚Üí slower decay ‚Üí more persistent force error memory. For LEO drag: ŌĄ~orbital period (~90 min), NOT the integration step.","DMC adds ő∑ to the state vector and estimates it. This increases state dimension (n‚Üín+1 per axis) and requires extending HŐÉ with ‚ąāG/‚ąāő∑ columns (usually zero for range/Doppler).","BATCH PROCESSOR STILL CANNOT USE SNC/DMC. Temporal correlations make R non-block-diagonal. Only sequential KF handles process noise efficiently.","ő≤‚Üí‚ąě: GM‚Üíwhite noise (SNC). ő≤‚Üí0: GM‚Üírandom walk. Pick ŌĄ based on physics of the force error, not numerics."],
drills:[{q:"What is the physical meaning of the correlation time ŌĄ in the Gauss-Markov process? What are the limits ő≤‚Üí‚ąě and ő≤‚Üí0?",a:"ŌĄ=1/ő≤ is the time constant of exponential memory decay. The autocorrelation of ő∑ is E[ő∑(t)ő∑(t+s)]=(ŌÉ¬≤/2ő≤)e^{‚ąíő≤|s|}. After time ŌĄ, the correlation has dropped to 1/e‚Čą37% of its initial value. ő≤‚Üí‚ąě (ŌĄ‚Üí0): GM reduces to white noise ‚ÄĒ zero correlation time, same as SNC. ő≤‚Üí0 (ŌĄ‚Üí‚ąě): GM becomes a random walk ‚ÄĒ ő∑ stays constant forever. For LEO atmospheric drag: ŌĄ~90min (one orbital period) is physically motivated."},
{q:"Why does the batch processor fail with SNC/DMC while the sequential KF handles it naturally?",a:"With process noise Q>0, the state at t‚āĖ depends on u(ŌĄ) for all ŌĄ‚ąą[t‚āĖ‚āč‚āĀ,t‚āĖ]. This introduces temporal correlations between observations ‚ÄĒ the full observation error covariance RŐĄ becomes m√óm and non-block-diagonal. For 5000‚Äď7000 DORIS obs (typical for TOPEX/Poseidon), inverting a 7000√ó7000 dense matrix is computationally impossible.\n\nKF naturally handles SNC: őďQőďŠĶÄ is simply added at each time step as a small n√ón correction. R‚āĖ at each observation epoch remains p√óp. The KF never forms the full RŐĄ matrix ‚ÄĒ process noise is local to each step."}]
}
]

const TABS=[{k:'overview',lbl:'ūüďĖ Overview'},{k:'equations',lbl:'‚ö° Equations'},{k:'derivation',lbl:'ūüĒ¨ Derivation'},{k:'matlab',lbl:'ūüíĽ MATLAB'},{k:'traps',lbl:'‚ö†ÔłŹ Traps'},{k:'drill',lbl:'ūüí™ Drill'}]
let cur=0,activeTab='overview',DS={}

function buildSidebar(){
 document.getElementById('slist').innerHTML=''
 M.forEach((m,i)=>{
  const b=document.createElement('button')
  b.className='sitem'+(i===cur?' active':'')
  b.innerHTML=`<span class="sitem-icon">${m.icon}</span><div class="sitem-text"><div class="sitem-title">${m.title}</div><div class="sitem-pages">${m.badge}</div></div>`
  b.onclick=()=>{cur=i;activeTab='overview';render()}
  document.getElementById('slist').appendChild(b)
 })
}

function buildHead(){
 const m=M[cur]
 document.getElementById('m-icon').textContent=m.icon
 document.getElementById('m-title').textContent=m.title
 document.getElementById('m-pages').textContent=m.badge
 document.getElementById('m-why').innerHTML=m.why
}

function buildTabs(){
 document.getElementById('tabs').innerHTML=''
 TABS.forEach(t=>{
  const b=document.createElement('button')
  b.className='tab'+(activeTab===t.k?' active':'')
  b.textContent=t.lbl
  b.onclick=()=>{activeTab=t.k;buildContent()}
  document.getElementById('tabs').appendChild(b)
 })
}

function buildContent(){
 document.querySelectorAll('.tab').forEach((b,i)=>{b.className='tab'+(TABS[i].k===activeTab?' active':'')})
 const cc=document.getElementById('content'); cc.innerHTML=''
 const m=M[cur]

 if(activeTab==='overview'){
  cc.innerHTML=`<div class="obj-box"><strong>ūüéĮ Objective:</strong> ${m.objective}</div>`
  m.overview.forEach(o=>{cc.innerHTML+=`<div class="ov-card"><div class="ov-label">${o.label}</div><div class="ov-text">${o.text}</div></div>`})
 } else if(activeTab==='equations'){
  cc.innerHTML='<h4>Key equations ‚ÄĒ exact TSB notation</h4>'
  m.equations.forEach(e=>{cc.innerHTML+=`<div class="eq-box"><div class="eq-label">${e.label}</div><div class="eq-formula">${e.eq}</div>${e.note?`<div class="eq-note">${e.note}</div>`:''}</div>`})
 } else if(activeTab==='derivation'){
  cc.innerHTML='<h4>Step-by-step ‚ÄĒ professor may stop you at any line</h4>'
  cc.innerHTML+=`<div class="deriv-box">${m.derivation}</div>`
 } else if(activeTab==='matlab'){
  cc.innerHTML=`<div class="matlab-box"><div class="matlab-head">MATLAB ‚ÄĒ complete runnable code</div><pre class="matlab-code">${m.matlab}</pre></div>`
 } else if(activeTab==='traps'){
  cc.innerHTML='<h4>Exam traps ‚ÄĒ where marks are lost</h4>'
  m.traps.forEach(t=>{cc.innerHTML+=`<div class="trap-item"><span class="trap-icon">‚ö†</span><span class="trap-text">${t}</span></div>`})
 } else if(activeTab==='drill'){
  cc.innerHTML='<h4>Rapid-fire oral questions ‚ÄĒ click to reveal</h4>'
  m.drills.forEach((d,i)=>{
   const k=`${cur}_${i}`,o=DS[k]
   cc.innerHTML+=`<div class="drill-item"><button class="drill-q" onclick="td('${k}')"><span class="drill-num">Q${i+1}</span><span class="drill-qtext">${d.q}</span><span class="drill-chev${o?' open':''}">‚Ėľ</span></button><div class="drill-ans${o?' open':''}">${d.a}</div></div>`
  })
 }

 cc.innerHTML+=`<div class="nav-row">`
 if(cur>0) cc.innerHTML+=`<button class="btn" onclick="ns(-1)">‚Üź Previous</button>`
 if(cur<M.length-1) cc.innerHTML+=`<button class="btn primary" onclick="ns(1)">Next section ‚Üí</button>`
 else cc.innerHTML+=`<div style="padding:10px 0;font-size:12px;color:#a78bfa">‚úď Sections 40‚Äď70% complete ‚ÄĒ ¬ß4.7 to ¬ß4.9 (pp.199‚Äď233)</div>`
 cc.innerHTML+=`</div>`
}

window.td=function(k){
 DS[k]=!DS[k]
 const idx=parseInt(k.split('_')[1])
 const items=document.querySelectorAll('.drill-item')
 if(items[idx]){
  items[idx].querySelector('.drill-chev').classList.toggle('open',DS[k])
  items[idx].querySelector('.drill-ans').classList.toggle('open',DS[k])
 }
}
window.ns=function(d){cur=Math.max(0,Math.min(M.length-1,cur+d));activeTab='overview';render()}
function render(){buildSidebar();buildHead();buildTabs();buildContent()}
render()
</script>
