 {label:"Validity and iteration",text:"Linearisation only holds when |X−X*| is small. If initial guess is poor: solve for x̂, update X*←X*+x̂, recompute O−C, repeat. Iteration drives the residuals to zero."},

{label:"Nonlinear dynamics (Eq.4.2.1)",eq:"Ẋ(t) = F(X, t),   X(tₖ) ≡ Xₖ",note:"True equations of motion — nonlinear, cannot invert directly"},
{label:"Deviation definition",eq:"x(t) = X(t) − X*(t)   [n×1]",note:"THIS is what estimators solve for. X* satisfies Ẋ*=F(X*,t)."},
{label:"A(t) dynamics matrix (Eq.4.2.5)",eq:"A(t) = [∂F/∂X]*  evaluated on X*(t)   [n×n]",note:"Time-varying along the orbit. Computed analytically or numerically."},

{label:"H̃ᵢ observation partials (Eq.4.2.6)",eq:"H̃ᵢ = [∂G/∂X]*ᵢ   [p×n]  at (Xᵢ*,tᵢ)",note:"Evaluated on X*(t). p = number of observables per epoch."},
{label:"Linearised observation + O−C (Eq.4.2.6) ★",eq:"yᵢ = H̃ᵢ xᵢ + εᵢ\nyᵢ = Yᵢ − G(Xᵢ*,tᵢ)   [O−C residual]",note:"The O−C residual is the input to all estimators"},
],
derivation:`STEP-BY-STEP LINEARISATION (TSB §4.2):

1) True dynamics: Ẋ = F(X,t)
   Reference:     Ẋ* = F(X*,t)
   Subtract: ẋ = F(X,t) − F(X*,t)

2) Taylor expand F around X*:
   F(X,t) = F(X*,t) + [∂F/∂X]*(X−X*) + O(|x|²)

3) Define A(t) = [∂F/∂X]*, drop O(|x|²):
   ẋ = A(t)x   ← LINEAR! (Eq.4.2.6)

4) For observations G(X,ti):
   Yi = G(Xi*,ti) + [∂G/∂X]*i(Xi−Xi*) + εi
   yi = Yi − G(Xi*,ti) = H̃i·xi + εi   ← LINEAR!

RANGE EXAMPLE ρ = √[(X−Xs)²+(Y−Ys)²]:
  ∂ρ/∂X = (X−Xs)/ρ    ∂ρ/∂Y = (Y−Ys)/ρ
  ∂ρ/∂Ẋ = ∂ρ/∂Ẏ = 0   ∂ρ/∂μ = 0
  H̃ = [(X−Xs)/ρ, (Y−Ys)/ρ, 0, 0, 0, −(X−Xs)/ρ, −(Y−Ys)/ρ]*
                                    ↑ station coord partials`,
matlab:`function [A, H_tilde] = linearise_system(X_star)
% State X = [x;y;xdot;ydot;mu;xs;ys]  (n=7)
% Observable: range rho = sqrt((x-xs)^2+(y-ys)^2)
  x=X_star(1); y=X_star(2); mu=X_star(5);
  xs=X_star(6); ys=X_star(7);
  r   = sqrt(x^2 + y^2);
  rho = sqrt((x-xs)^2 + (y-ys)^2);

  %% A matrix — linearised dynamics (Eq.4.2.5)
  A = zeros(7,7);
  A(1,3)=1; A(2,4)=1;
  A(3,1) = -mu/r^3 + 3*mu*x^2/r^5;
  A(3,2) =  3*mu*x*y/r^5;       A(3,5) = -x/r^3;
  A(4,1) =  3*mu*x*y/r^5;
  A(4,2) = -mu/r^3 + 3*mu*y^2/r^5; A(4,5) = -y/r^3;
  % rows 5-7: mu,xs,ys constant → zero

  %% H_tilde — observation partials (Eq.4.2.6)
  H_tilde = zeros(1,7);
  H_tilde(1) =  (x-xs)/rho;
  H_tilde(2) =  (y-ys)/rho;
  H_tilde(6) = -(x-xs)/rho;
  H_tilde(7) = -(y-ys)/rho;
end`,

drills:[{q:"What exactly is x(t)? Write its definition and the ODE it satisfies.",a:"x(t) = X(t) − X*(t) is the n×1 state deviation. It satisfies the linearised ODE: ẋ = A(t)x (Eq.4.2.6), where A(t) = [∂F/∂X]* is evaluated on the reference trajectory X*(t). The solution is x(t) = Φ(t,tₖ)xₖ."},
{q:"Define H̃ᵢ. On which trajectory is it evaluated?",a:"H̃ᵢ = [∂G/∂X]* is the p×n matrix of observation partial derivatives. It is evaluated on the REFERENCE trajectory X*(t) at time tᵢ — NEVER on the true or estimated trajectory. Its rows give how each observable changes with each state component."},
{q:"Why must we iterate the linearisation?",a:"Linearisation discards O(|x|²) terms — valid only when |X−X*| is small. If the initial reference X*(t₀) is far from truth, these terms are large and the estimate x̂ is biased. After solving for x̂, we update X*₀←X*₀+x̂, recompute O−C residuals (now smaller), and repeat. Iteration drives |x̂|→0."}]
},

overview:[
 {label:"Definition",text:"Φ(t,tₖ) is the n×n matrix satisfying x(t) = Φ(t,tₖ)·xₖ. It solves the linearised ODE exactly for any initial condition xₖ. Initial condition: Φ(tₖ,tₖ) = I."},
 {label:"How to compute",text:"Numerically: integrate Φ̇ = A(t)Φ alongside Ẋ* = F(X*,t). For n=6: 36+6 = 42 coupled ODEs. Use ode113 with tight tolerances in MATLAB."},
 {label:"Mapping observations to epoch",text:"At time tᵢ: yᵢ = H̃ᵢxᵢ + εᵢ. Since xᵢ = Φ(tᵢ,tₖ)xₖ, substituting gives yᵢ = H̃ᵢΦ(tᵢ,tₖ)xₖ + εᵢ = Hᵢxₖ + εᵢ. All observations reference the single unknown xₖ."},
 {label:"Covariance propagation",text:"If Pⱼ is the covariance at tⱼ, then Pₖ = Φ(tₖ,tⱼ)·Pⱼ·Φᵀ(tₖ,tⱼ). Φᵀ is on the RIGHT — a classic exam trap."},
],
equations:[
{label:"STM definition (Eq.4.2.7)",eq:"x(t) = Φ(t,tₖ) · xₖ",note:"Solution to ẋ = A(t)x with xₖ given at epoch"},
{label:"STM differential equation (Eq.4.2.10) ★",eq:"Φ̇(t,tₖ) = A(t) · Φ(t,tₖ)\nΦ(tₖ,tₖ) = I",note:"n² ODEs — integrate alongside orbit propagation"},
{label:"Property 1: identity",eq:"Φ(tₖ,tₖ) = Iₙ",note:""},
{label:"Property 2: composition (Eq.4.2.8)",eq:"Φ(tᵢ,tₖ) = Φ(tᵢ,tⱼ) · Φ(tⱼ,tₖ)",note:"Chain rule — multiply STMs for adjacent intervals"},
{label:"Property 3: inverse (Eq.4.2.8)",eq:"Φ⁻¹(t,tₖ) = Φ(tₖ,t)",note:"Backward propagation without explicit inversion"},
{label:"Map obs to epoch (Eq.4.2.37) ★",eq:"Hᵢ = H̃ᵢ · Φ(tᵢ,tₖ)   [p×n]",note:"MUST apply before stacking H matrix"},
{label:"Full linear system (Eq.4.2.39) ★",eq:"y = H · xₖ + ε\nH = [H₁; H₂; …; Hₗ]   [m×n]",note:"Single epoch state xₖ connects all ℓ observations"},
{label:"Covariance propagation (Eq.4.4.22) ★★",eq:"Pₖ = Φ(tₖ,tⱼ) · Pⱼ · Φᵀ(tₖ,tⱼ)",note:"Φᵀ on the RIGHT — most common single exam error"},
],
derivation:`DERIVATION OF STM DIFFERENTIAL EQUATION:

1) STM maps deviations: x(t) = Φ(t,tₖ) · xₖ
2) Differentiate wrt t (xₖ constant at epoch):
   ẋ(t) = Φ̇(t,tₖ) · xₖ
3) From linearised dynamics: ẋ(t) = A(t)x(t) = A(t)Φ(t,tₖ)xₖ
4) Since xₖ is arbitrary — equate coefficients:
   Φ̇(t,tₖ) = A(t)Φ(t,tₖ)   [n×n ODE]
   Φ(tₖ,tₖ) = I             [initial condition]

MAPPING TO EPOCH:
5) At tᵢ: yᵢ = H̃ᵢ·xᵢ + εᵢ   (xᵢ at tᵢ)
6) Use STM: xᵢ = Φ(tᵢ,tₖ)·xₖ
7) Substitute:
   yᵢ = H̃ᵢ·Φ(tᵢ,tₖ)·xₖ + εᵢ = Hᵢ·xₖ + εᵢ
   where Hᵢ ≡ H̃ᵢΦ(tᵢ,tₖ)  [the mapped matrix]
8) Stack all ℓ observations:
   y = H·xₖ + ε  ← one linear system in xₖ ✓`,
matlab:`function stm_demo()
% Integrate STM alongside orbit — two-body, n=6
  mu=3.986004418e14; r0=6778e3; v0=sqrt(mu/r0);
  X0=[r0;0;0;0;v0;0]; n=6;
  Z0=[X0; eye(n)(:)];     % 6+36=42 ODEs total
  T=2*pi*sqrt(r0^3/mu);   % one orbital period
  opts=odeset('RelTol',1e-12,'AbsTol',1e-14);
  [~,Z]=ode113(@(t,z)eom_stm(t,z,mu,n),linspace(0,T,500),Z0,opts);

  Phi_T=reshape(Z(end,n+1:end),n,n);   % STM after 1 orbit
  fprintf('STM check: %.2e\\n',norm(Phi_T/Phi_T-eye(n)));

  %% Covariance propagation: P(T) = Phi*P0*Phi'
  P0=diag([100 100 100 0.1 0.1 0.1].^2);  % initial uncertainties
  P_T=Phi_T*P0*Phi_T';                     % Eq.4.4.22
  fprintf('Pos sigma after 1 orbit: %.2f m\\n',sqrt(P_T(1,1)));
end
function dZ=eom_stm(~,Z,mu,n)
  X=Z(1:n); Phi=reshape(Z(n+1:end),n,n); r=X(1:3); rn=norm(r);
  A=[zeros(3),eye(3); mu/rn^3*(-eye(3)+3*(r*r')/rn^2),zeros(3)];
  dZ=[X(4:6);-mu/rn^3*r; (A*Phi)(:)];
end`,
traps:["Φ maps LINEAR DEVIATIONS only — a separate ODE propagates the full state X*(t).","Hᵢ=H̃ᵢΦ(tᵢ,tₖ): Φ goes FROM tₖ TO tᵢ. Wrong order gives catastrophically wrong results.","Covariance: Pₖ=Φ·Pⱼ·Φᵀ — Φᵀ on the RIGHT. Placing it on the left is the #1 exam error.","For nonlinear OD: Φ must be RECOMPUTED at every iteration as X*(t) changes."],
drills:[{q:"Write Φ̇ with its initial condition. How many ODEs for n=6?",a:"Φ̇(t,tₖ)=A(t)Φ(t,tₖ), Φ(tₖ,tₖ)=I. For n=6: 6×6=36 scalar ODEs for Φ plus 6 for X*(t) = 42 total. All must be integrated simultaneously."},
{q:"An observation at t₁ gives y₁=H̃₁x₁+ε₁. Express this in terms of xₖ at epoch t₀.",a:"Use STM: x₁=Φ(t₁,t₀)xₖ. Substitute: y₁=H̃₁·Φ(t₁,t₀)·xₖ+ε₁=H₁·xₖ+ε₁, where H₁=H̃₁Φ(t₁,t₀) is the p×n mapped observation matrix."},
{q:"State all three STM properties. Write the covariance propagation formula.",a:"(1) Φ(tₖ,tₖ)=I; (2) Φ(tᵢ,tₖ)=Φ(tᵢ,tⱼ)Φ(tⱼ,tₖ) [composition]; (3) Φ⁻¹(t,tₖ)=Φ(tₖ,t) [inverse]. Covariance: Pₖ=Φ(tₖ,tⱼ)·Pⱼ·Φᵀ(tₖ,tⱼ). Φᵀ on the RIGHT."}]
},

 {label:"Four computation methods (§4.2.2)",text:"(1) Solve ODE directly; (2) Integrate Φ̇=AΦ componentwise; (3) Laplace transforms: Φ=L⁻¹[(sI−A)⁻¹]; (4) Eigenvalues: Φ=VeΛτV⁻¹ (Eq.4.2.35). Method 2 is what we implement numerically for time-varying A."},
 {label:"Physical interpretation of Φ",text:"Column j of Φ shows how a unit kick to state component j at t₀ propagates to ALL components at time t. It encodes sensitivity to initial conditions simultaneously for all directions."},
 {label:"When constant A applies",text:"Constant A = constant orbit dynamics = only for simplified force models. In real orbit mechanics A(t) is time-varying → must integrate Φ̇=A(t)Φ numerically alongside orbit propagation."},
],
equations:[
{label:"Example system in state space (Eq.4.2.29)",eq:"Ẋ = AX  with  A = [[1, 0], [β, 0]]",note:"x₁ grows exponentially; x₂ responds to x₁"},
{label:"STM solution (Eq.4.2.33) ★",eq:"Φ(t,t₀) = [[e^(t−t₀),       0      ],\n            [β(e^(t−t₀)−1), 1      ]]",note:"Verify: set t=t₀ → [[1,0],[0,1]] = I ✓"},
{label:"Eigenvalue method (Eq.4.2.35)",eq:"Φ(t,t₀) = V · exp(Λ(t−t₀)) · V⁻¹\nwhere V = matrix of normalised eigenvectors of A",note:"Works only for constant A — not applicable to orbit mechanics generally"},
{label:"Verification check",eq:"Check 1: Φ(t₀,t₀) = I  (set t=t₀ → get I)\nCheck 2: Φ̇ = AΦ  (differentiate and verify)",note:"ALWAYS verify both conditions for any candidate STM"},
],
derivation:`METHOD 2: DIRECT INTEGRATION OF Φ̇=AΦ (Eq.4.2.34)

A = [[1,0],[β,0]]  →  Φ̇ = AΦ with Φ(t₀,t₀)=I:

Component equations:
  φ̇₁₁ = φ₁₁   →  φ₁₁ = e^(t−t₀)   [φ₁₁(t₀)=1]
  φ̇₂₁ = βφ₁₁  →  φ₂₁ = β(e^(t−t₀)−1)  [φ₂₁(t₀)=0]
  φ̇₁₂ = φ₁₂   →  φ₁₂ = 0   [φ₁₂(t₀)=0]
  φ̇₂₂ = βφ₁₂  →  φ₂₂ = 1   [φ₂₂(t₀)=1]

Therefore:
  Φ(t,t₀) = [[e^(t−t₀),      0],   (Eq.4.2.33)
             [β(e^(t−t₀)−1), 1]]

VERIFICATION:
  t=t₀: Φ = [[e⁰,0],[β(e⁰−1),1]] = [[1,0],[0,1]] = I ✓
  Φ̇ = [[ e^τ, 0],[βe^τ, 0]] = [[1,0],[β,0]]·Φ = AΦ ✓`,
matlab:`% TSB Exercise 4.19 item (1): given Phi, find A
% Phi(t) = diag(e^(-2at), e^(bt)) — what is A?
% Use: A = Phi_dot * inv(Phi)

syms a b t
Phi = diag([exp(-2*a*t), exp(b*t)]);
Phi_dot = diff(Phi, t);
A = Phi_dot / Phi;   % = Phi_dot * inv(Phi)
disp('A = '); disp(simplify(A))
% Answer: A = diag(-2a, b)

% Verify Example 4.2.2 STM:
beta = 1.5; t0 = 0; t_end = 2;
tau = t_end - t0;
Phi_exact = [exp(tau), 0; beta*(exp(tau)-1), 1];  % Eq.4.2.33

% Verify Phi_dot = A*Phi:
A = [1 0; beta 0];
dPhi_dt = expm(A*tau)*A;  % d/dt(e^(At)) = Ae^(At) for const A
fprintf('Phi_dot - A*Phi = %.2e\\n', norm(A*Phi_exact - [exp(tau),0;beta*exp(tau),0]));`,
traps:["Φ=exp(Aτ) ONLY works for constant A. For orbit mechanics with time-varying A(t), this formula is wrong — must integrate Φ̇=AΦ numerically.","ALWAYS verify your STM satisfies BOTH Φ(t₀,t₀)=I AND Φ̇=AΦ. Missing either check can mask errors.","TSB Exercise 4.19 item (6): Φ=diag(3e^(at),2e^(-bt)) satisfies Φ̇=AΦ but is NOT a valid STM — it doesn't satisfy Φ(t₀,t₀)=I when t₀≠0."],
drills:[{q:"Verify that Φ(t,t₀)=[[e^(t−t₀),0],[β(e^(t−t₀)−1),1]] satisfies Φ(t₀,t₀)=I.",a:"Set t=t₀ (so τ=t−t₀=0): Φ=[[e⁰,0],[β(e⁰−1),1]]=[[1,0],[β·0,1]]=[[1,0],[0,1]]=I ✓"},
{q:"TSB Exercise 4.19 item (1): given Φ(t)=diag(e^(−2at), e^(bt)), find matrix A.",a:"From Φ̇=AΦ → A=Φ̇·Φ⁻¹. Φ̇=diag(−2a·e^(−2at), b·e^(bt)). Φ⁻¹=diag(e^(2at), e^(−bt)) (diagonal, invert each entry). A=Φ̇·Φ⁻¹=diag(−2a, b). Physically: ẋ₁=−2ax₁ and ẋ₂=bx₂."}]
},

overview:[

{label:"Key mapping step (Eq.4.2.37) ★★",eq:"Hᵢ = H̃ᵢ · Φ(tᵢ,tₖ)   [p×n]",note:"Map H̃ to epoch FIRST. Never put H̃ directly into normal equations!"},

],
derivation:`OBSERVATION MAPPING DERIVATION:

1) At time tᵢ: yᵢ = H̃ᵢ·xᵢ + εᵢ
   (xᵢ is state deviation AT TIME tᵢ, not at epoch)

2) Use STM to connect to epoch:
   xᵢ = Φ(tᵢ,tₖ)·xₖ

3) Substitute:
   yᵢ = H̃ᵢ·Φ(tᵢ,tₖ)·xₖ + εᵢ
      = Hᵢ·xₖ + εᵢ
   where Hᵢ ≡ H̃ᵢΦ(tᵢ,tₖ)  [the MAPPED matrix]

4) Repeat for all ℓ observation epochs.
   Stack vertically:
   y = [y₁] = [H₁] xₖ + [ε₁]
       [y₂]   [H₂]       [ε₂]
       [...]   [...]       [...]
       [yₗ]   [Hₗ]       [εₗ]
   y = H·xₖ + ε   ← ONE linear system ✓

DIMENSION CHECK:
  yᵢ:  [p×1]  (p obs per epoch)
  H̃ᵢ:  [p×n]  (p obs, n states)
  Φ:   [n×n]  (n×n STM)
  Hᵢ:  [p×n]  (H̃ᵢ·Φ)
  H:   [m×n]  (m=p·ℓ stacked)`,
matlab:`%% Build H matrix and observation vector
n_state = 6;    % state dimension
p_obs   = 2;    % obs per epoch (range + rate)
n_epochs= 20;   % number of observation times

H_full = zeros(p_obs*n_epochs, n_state);
y_full = zeros(p_obs*n_epochs, 1);

for i = 1:n_epochs
    t_i = t_obs(i);
    
    % 1. Propagate orbit and STM from t0 to t_i
    [X_star_i, Phi_i] = propagate_orbit_stm(X_star_0, t0, t_i);
    
    % 2. Compute observation partials at (X_star_i, t_i)
    [G_i, H_tilde_i] = obs_partials(X_star_i, t_i);
    
    % 3. MAP TO EPOCH: Hᵢ = H̃ᵢ · Φ(tᵢ,t₀)
    H_i = H_tilde_i * Phi_i;           % [p×n]
    
    % 4. O-C residual
    y_i = Y_obs(i,:)' - G_i;           % [p×1]
    
    % 5. Stack
    rows = (i-1)*p_obs + (1:p_obs);
    H_full(rows, :) = H_i;
    y_full(rows)    = y_i;
end

% Now solve: x_hat = (H'*W*H) \\ (H'*W*y)`,

},

overview:[
 {label:"Standard LS (equal weights)",text:"Minimise ‖y−Hx‖². Normal equations: (HᵀH)x̂=Hᵀy → x̂=(HᵀH)⁻¹Hᵀy. Requires m≥n and H full column rank. (HᵀH)⁻¹Hᵀ is the Moore-Penrose pseudoinverse of H."},
 {label:"Minimum norm (m<n)",text:"Underdetermined: infinitely many solutions. Minimise ‖x̂‖² subject to Hx=y. Solution: x̂=Hᵀ(HHᵀ)⁻¹y. Requires H full ROW rank. Inverts the m×m matrix HHᵀ instead of n×n HᵀH."},
 {label:"Geometric interpretation",text:"Hx̂ₖ is the orthogonal projection of y onto the column space of H. The post-fit residual ε̂=y−Hx̂ₖ is perpendicular to every column of H: Hᵀε̂=0. This is the geometric statement of the normal equations."},
 {label:"Shortcomings (§4.3.2)",text:"LS treats all observations equally (W=I). Different obs types (range vs Doppler) have different noise levels → unequal accuracy → LS gives suboptimal weight. WLS (§4.3.3) fixes this."},
],
equations:[
{label:"LS cost function (Eq.4.3.1)",eq:"J(x) = ½(y − Hx)ᵀ(y − Hx) = ½‖y−Hx‖²",note:"Sum of squared residuals — no statistical knowledge required"},
{label:"Gradient derivation → normal equations (Eq.4.3.4) ★",eq:"∂J/∂x = −Hᵀ(y−Hx) = 0\n→ (HᵀH) x̂ₖ = Hᵀy",note:"Set gradient to zero. HᵀH must be invertible (full rank H)."},
{label:"LS solution (Eq.4.3.6)",eq:"x̂ₖ = (HᵀH)⁻¹ Hᵀy",note:"MATLAB: x_hat = (H'*H) \\ (H'*y)  — use backslash!"},
{label:"Minimum norm (Eq.4.3.13) — when m<n",eq:"x̂ₖ = Hᵀ(HHᵀ)⁻¹ y",note:"Minimises ‖x̂‖² given Hx=y. Requires H full row rank."},
{label:"Post-fit residuals",eq:"ε̂ = y − H x̂ₖ   [should look like white noise]",note:"Systematic patterns → model error or non-convergence"},
],
derivation:`DERIVING LS NORMAL EQUATIONS:

1) Cost: J = ½(y−Hx)ᵀ(y−Hx)
   Expand: = ½[yᵀy − 2xᵀHᵀy + xᵀHᵀHx]

2) Gradient wrt x:
   ∂J/∂x = −Hᵀ(y−Hx)

3) Set to zero for minimum:
   Hᵀ(y − Hx̂) = 0
   HᵀHx̂ = Hᵀy   ← NORMAL EQUATIONS (Eq.4.3.4)

4) Invert (if HᵀH positive definite):
   x̂ = (HᵀH)⁻¹Hᵀy

5) Verify minimum: ∂²J/∂x² = HᵀH > 0  ✓
   (positive definite if rank(H)=n)

GEOMETRIC INTERPRETATION:
   Hᵀε̂ = HᵀHx̂ − Hᵀy = 0  (from normal equations)
   → post-fit residual ε̂ ⊥ every column of H
   → Hx̂ is the orthogonal projection of y onto range(H) ✓`,
matlab:`%% Least squares — simple example
H = [1 2; 3 1; 2 3; 1 1];   % 4 obs, 2 states (overdetermined)
x_true = [5; 3];
sigma = 0.1;
y = H*x_true + sigma*randn(4,1);   % noisy obs

%% Standard LS (Eq.4.3.6) — use backslash!
x_hat = (H'*H) \\ (H'*y);         % NEVER use inv()
e_hat = y - H*x_hat;               % post-fit residuals

fprintf('True: [%.4f; %.4f]\\n', x_true);
fprintf('Estimated: [%.4f; %.4f]\\n', x_hat);
fprintf('RMS post-fit: %.5f\\n', rms(e_hat));

%% Minimum norm (m<n case) — example
H_under = [1 2 3];   % 1 obs, 3 states (underdetermined)
y_under = 14;
x_min_norm = H_under' / (H_under*H_under') * y_under;
fprintf('Min norm solution: [%.3f; %.3f; %.3f]\\n', x_min_norm);
fprintf('Check Hx=y: %.4f (should be %.1f)\\n', H_under*x_min_norm, y_under);`,
traps:["NEVER use inv(H'*H)*H'*y in MATLAB. Use (H'*H)\\(H'*y) — backslash is faster and far more numerically stable.","HᵀH singular → state NOT observable from this data. This is a geometry problem, not numerical — more data of the same type won't fix it.","Post-fit residuals that look systematic (not white noise) → model error or non-convergence. Must investigate."],
drills:[{q:"Derive the LS normal equations from J=½‖y−Hx‖². State the condition for a unique solution.",a:"J=½(y−Hx)ᵀ(y−Hx)=½[yᵀy−2xᵀHᵀy+xᵀHᵀHx]. ∂J/∂x=−Hᵀ(y−Hx)=0 → (HᵀH)x̂=Hᵀy → x̂=(HᵀH)⁻¹Hᵀy. Unique solution requires HᵀH invertible ↔ rank(H)=n (H full column rank) ↔ m≥n and no degenerate geometry."},
{q:"When do you use minimum norm instead of standard LS? Write the formula.",a:"When m<n (underdetermined: fewer observations than unknowns). Infinitely many solutions satisfy Hx=y. Minimum norm picks the one with smallest ‖x̂‖²: x̂=Hᵀ(HHᵀ)⁻¹y. This inverts the m×m matrix HHᵀ (smaller when m<n)."}]
},
{id:7,badge:"§4.3.1–4.3.3 · pp.174–180",title:"Min. norm, shortcomings, and weighted LS",icon:"⚖️",pages:"§4.3.1–4.3.3 · pp.174–180",
why:"<strong>Why extend LS?</strong> Standard LS ignores noise statistics (W=I). WLS with W=R⁻¹ is the first estimator that uses measurement noise knowledge — and it equals the Minimum Variance Estimate (§4.4). WLS with a priori (Eq.4.3.25) is the precursor to the Kalman filter measurement update.",

overview:[
 {label:"§4.3.2 Shortcomings of standard LS",text:"LS treats all observations equally (W=I). This is suboptimal when observations have different noise levels (σ₁≠σ₂) or different types (range vs Doppler in different units). Cannot meaningfully combine different observable types without weighting."},
 {label:"§4.3.3 Weighted LS — W=R⁻¹",text:"Minimise εᵀWε with W=R⁻¹. Result: x̂=(HᵀWH)⁻¹HᵀWy, P=(HᵀWH)⁻¹. Observations with small noise Rᵢ → large weight Wᵢ → pull estimate toward them more. OPTIMAL when W=R⁻¹."},
 {label:"§4.3.3 WLS + a priori (Eq.4.3.25)",text:"Add penalty term for deviation from prior x̄ₖ with weight Wₖ=P̄ₖ⁻¹. Result: x̂=(HᵀWH+Wₖ)⁻¹(HᵀWy+Wₖx̄ₖ). Prevents ill-conditioning and regularises the problem. THIS IS the KF measurement update (§4.7)."},
 {label:"Pre-normalisation (§4.3.4)",text:"If R is not diagonal (correlated observations): factorise R=VεVεᵀ (Cholesky), then z=Vε⁻¹y, H′=Vε⁻¹H. Standard LS on (z,H′) gives same answer as WLS with W=R⁻¹. Converts correlated obs to uncorrelated."},
],
equations:[
{label:"WLS cost (Eq.4.3.18)",eq:"J(x) = ½(y−Hx)ᵀ W (y−Hx),   W = R⁻¹",note:"W diagonal → weight each obs by its inverse variance"},
{label:"WLS solution (Eq.4.3.22) ★",eq:"x̂ₖ = (HᵀWH)⁻¹ HᵀWy\nPₖ  = (HᵀWH)⁻¹",note:"Optimal when W=R⁻¹. Equals MVE (§4.4). Use backslash in MATLAB!"},
{label:"WLS + a priori (Eq.4.3.25) ★★",eq:"x̂ₖ = (HᵀWH + Wₖ)⁻¹(HᵀWy + Wₖx̄ₖ)\nWₖ = P̄ₖ⁻¹",note:"The precursor to the KF measurement update. Memorise this equation."},
{label:"MATLAB implementation ★",eq:"Lambda = H'*W*H + Wk;   % normal matrix\nNu     = H'*W*y + Wk*x_bar;\nx_hat  = Lambda \\ Nu;    % BACKSLASH not inv()!\nP_hat  = inv(Lambda);",note:"Always use backslash operator — never inv() for solving linear systems"},
],
derivation:`WLS NORMAL EQUATIONS DERIVATION:

J = ½(y−Hx)ᵀ W (y−Hx)  [W = R⁻¹ symmetric PD]

∂J/∂x = −HᵀW(y−Hx) = 0
→ HᵀWy − HᵀWHx̂ = 0
→ (HᵀWH) x̂ = HᵀWy   ← WLS NORMAL EQUATIONS ✓

WLS + A PRIORI:
Add penalty: J_total = ½(y−Hx)ᵀW(y−Hx) + ½(x−x̄ₖ)ᵀWₖ(x−x̄ₖ)
∂J_total/∂x = −HᵀW(y−Hx) + Wₖ(x−x̄ₖ) = 0
→ (HᵀWH + Wₖ)x̂ = HᵀWy + Wₖx̄ₖ   ← Eq.4.3.25 ✓

CONNECTION TO KF: Eq.4.3.25 with W=R⁻¹ and Wₖ=P̄ₖ⁻¹:
  (HᵀR⁻¹H + P̄ₖ⁻¹)x̂ = HᵀR⁻¹y + P̄ₖ⁻¹x̄ₖ
  x̂ₖ = (HᵀR⁻¹H + P̄ₖ⁻¹)⁻¹(HᵀR⁻¹y + P̄ₖ⁻¹x̄ₖ) ← Eq.4.4.29 (MVE with prior)`,
matlab:`%% WLS with a priori (Eq.4.3.25) — complete example
% Setup: estimate position from range observations
n = 2;   % state: [x; y]
H = [cos(0), sin(0); cos(pi/4), sin(pi/4); cos(pi/2), sin(pi/2)];
sigma = [2; 1; 3];   % different noise per obs
R = diag(sigma.^2);  W = inv(R);

% Simulated observations (O-C residuals)
x_true  = [5; 3];
y = H*x_true + sigma.*randn(3,1);   % noisy obs

% A priori information
x_bar = [4; 4];       % prior estimate
P_bar = 2*eye(2);     % prior covariance
Wk    = inv(P_bar);   % prior weight

%% WLS + a priori (Eq.4.3.25)
Lambda = H'*W*H + Wk;
Nu     = H'*W*y + Wk*x_bar;
x_hat  = Lambda \\ Nu;    % BACKSLASH! Never inv()
P_hat  = inv(Lambda);

fprintf('True:      [%.4f; %.4f]\\n', x_true);
fprintf('Estimated: [%.4f; %.4f]\\n', x_hat);
fprintf('1-sigma:   [%.4f; %.4f]\\n', sqrt(diag(P_hat)));`,
traps:["WLS with arbitrary W is valid but NOT optimal. Only W=R⁻¹ gives minimum variance (MVE). Students often use W=I (equal weights) without realising it's suboptimal.","NEVER inv(H'*W*H)*H'*W*y in MATLAB. Always (H'*W*H)\\(H'*W*y) — backslash is essential.","Eq.4.3.25 with W=R⁻¹, Wₖ=P̄ₖ⁻¹ IS the Kalman filter measurement update (§4.7). Recognise this connection.","TSB Exercise 4.19 item (3): this is asking you to derive Eq.4.3.25 — set up J=½εᵀWε+½ηᵀWₖη and differentiate."],
drills:[{q:"Derive the WLS normal equations from J=½(y−Hx)ᵀW(y−Hx). What is W when WLS=MVE?",a:"∂J/∂x=−HᵀW(y−Hx)=0 → (HᵀWH)x̂=HᵀWy → x̂=(HᵀWH)⁻¹HᵀWy. WLS = MVE (minimum variance) when W=R⁻¹. Any other W gives valid but suboptimal solution."},
{q:"Write Eq.4.3.25 (WLS with a priori). What are x̄ₖ and Wₖ, and where does this equation reappear in Chapter 4?",a:"x̂ₖ=(HᵀWH+Wₖ)⁻¹(HᵀWy+Wₖx̄ₖ) where x̄ₖ is the a priori state estimate and Wₖ=P̄ₖ⁻¹ is its information. This is the precursor to: Eq.4.4.29 (MVE with prior), the batch processor (§4.6), and the Kalman filter measurement update (§4.7.18) — all three are reformulations of this same equation."},
{q:"TSB Exercise 4.19 item (3): performance index J=½εᵀWε+½ηᵀW̄η where η=x−x̄. Find x̂.",a:"J=½(y−Hx)ᵀW(y−Hx)+½(x−x̄)ᵀW̄(x−x̄). ∂J/∂x=−HᵀW(y−Hx)+W̄(x−x̄)=0. → (HᵀWH+W̄)x̂=HᵀWy+W̄x̄. x̂=(HᵀWH+W̄)⁻¹(HᵀWy+W̄x̄) — exactly Eq.4.3.25. Here W corresponds to R⁻¹ and W̄ to P̄₀⁻¹."}]
}
]

const TABS=[{k:'overview',lbl:'📖 Overview'},{k:'equations',lbl:'⚡ Equations'},{k:'derivation',lbl:'🔬 Derivation'},{k:'matlab',lbl:'💻 MATLAB'},{k:'traps',lbl:'⚠️ Traps'},{k:'drill',lbl:'💪 Drill'}]

let cur=0, activeTab='overview', drillStates={}

function buildSidebar(){
 const sl=document.getElementById('slist'); sl.innerHTML=''
 MODULES.forEach((m,i)=>{
  const b=document.createElement('button'); b.className='sitem'+(i===cur?' active':'')
  b.innerHTML=`<span class="sitem-icon">${m.icon}</span><div class="sitem-text"><div class="sitem-title">${m.title}</div><div class="sitem-pages">${m.pages}</div></div>`
  b.onclick=()=>{cur=i;activeTab='overview';render()}; sl.appendChild(b)
 })
}

function buildHead(){
 const m=MODULES[cur]
 document.getElementById('m-icon').textContent=m.icon
 document.getElementById('m-title').textContent=m.title
 document.getElementById('m-pages').textContent=m.badge
 document.getElementById('m-why').innerHTML=m.why
}

function buildTabs(){
 const tc=document.getElementById('tabs'); tc.innerHTML=''
 TABS.forEach(t=>{
  const b=document.createElement('button'); b.className='tab'+(activeTab===t.k?' active':'')
  b.textContent=t.lbl; b.onclick=()=>{activeTab=t.k;buildContent()}; tc.appendChild(b)
 })
}

function buildContent(){
 // update tab active states
 document.querySelectorAll('.tab').forEach((b,i)=>{b.className='tab'+(TABS[i].k===activeTab?' active':'')})
 const cc=document.getElementById('content'); cc.innerHTML=''
 const m=MODULES[cur]
 if(activeTab==='overview'){
  if(m.svg) cc.innerHTML+=`<div class="svg-wrap">${m.svg}</div>`
  if(m.overview){
   m.overview.forEach(o=>{cc.innerHTML+=`<div class="ov-card"><div class="ov-label">${o.label}</div><div class="ov-text">${o.text}</div></div>`})
  }
 } else if(activeTab==='equations'){
  cc.innerHTML='<h4>Key equations — TSB notation</h4>'
  if(!m.equations||m.equations.length===0){cc.innerHTML+='<div class="ov-card"><div class="ov-text" style="color:#4a6080">No separate equations for this section — see Overview.</div></div>'; return}
  m.equations.forEach(e=>{cc.innerHTML+=`<div class="eq-box"><div class="eq-label">${e.label}</div><div class="eq-formula">${e.eq}</div>${e.note?`<div class="eq-note">${e.note}</div>`:''}</div>`})
 } else if(activeTab==='derivation'){
  cc.innerHTML='<h4>Step-by-step derivation — professor may stop you at any line</h4>'
  cc.innerHTML+=`<div class="deriv-box">${m.derivation}</div>`
 } else if(activeTab==='matlab'){
  cc.innerHTML=`<div class="matlab-box"><div class="matlab-head">MATLAB — complete runnable code</div><pre class="matlab-code">${m.matlab}</pre></div>`
 } else if(activeTab==='traps'){
  cc.innerHTML='<h4>Exam traps — where marks are lost</h4>'
  m.traps.forEach(t=>{cc.innerHTML+=`<div class="trap-item"><span class="trap-icon">⚠</span><span class="trap-text">${t}</span></div>`})
 } else if(activeTab==='drill'){
  cc.innerHTML='<h4>Rapid-fire oral questions — click to reveal guidance</h4>'
  m.drills.forEach((d,i)=>{
   const key=`${cur}_${i}`, open=drillStates[key]
   cc.innerHTML+=`<div class="drill-item"><button class="drill-q" onclick="toggleDrill('${key}')"><span class="drill-num">Q${i+1}</span><span class="drill-qtext">${d.q}</span><span class="drill-chev${open?' open':''}">▼</span></button><div class="drill-ans${open?' open':''}">${d.a}</div></div>`
  })
  cc.innerHTML+=`<div style="margin-top:14px;padding:10px 13px;background:#0e1929;border-radius:8px;border:1px solid #1e3a5a"><div style="font-size:11px;color:#4a6080">After completing this section, continue to the next or jump directly to §4.4 (MVE) — the master formula.</div></div>`
 }
 // nav buttons
 cc.innerHTML+=`<div class="nav-row">`
 if(cur>0) cc.innerHTML+=`<button class="btn" onclick="navSec(-1)">← Previous</button>`
 if(cur<MODULES.length-1) cc.innerHTML+=`<button class="btn primary" onclick="navSec(1)">Next section →</button>`
 else cc.innerHTML+=`<div style="padding:10px 0;font-size:12px;color:#4ade80">✓ First 20% complete — §4.1 to §4.3.3 (pp.159–180)</div>`
 cc.innerHTML+=`</div>`
}

window.toggleDrill=function(key){
 drillStates[key]=!drillStates[key]
 const items=document.querySelectorAll('.drill-item')
 const idx=parseInt(key.split('_')[1])
 const item=items[idx]
 if(item){
  item.querySelector('.drill-chev').classList.toggle('open',drillStates[key])
  item.querySelector('.drill-ans').classList.toggle('open',drillStates[key])
 }
}

window.navSec=function(d){cur=Math.max(0,Math.min(MODULES.length-1,cur+d));activeTab='overview';render()}

function render(){buildSidebar();buildHead();buildTabs();buildContent()}
render()
</script>
</body>
</html>
